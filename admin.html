<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel PRO</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
}

.container {
  max-width:900px;
  margin:auto;
  padding:10px;
}

input,button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

td,th {
  border:1px solid #333;
  padding:8px;
}

img {
  width:70px;
  border-radius:5px;
}

/* 🔥 FIXED LOADER */
#loader {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  font-size:20px;
  z-index:9999;
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">Uploading... ⏳</div>

<div class="container">

<h2>🔥 Admin Panel PRO</h2>

<input id="name" placeholder="Name">
<input id="category" placeholder="Category">
<input id="url" placeholder="URL">
<input type="file" id="thumb">

<button onclick="uploadData()">Add Data</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>URL</th>
<th>Thumbnail</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwRkPA8Uw-IWHnJLFtw5jNo57f0MPeLMzPKV9dPcSyHaX7juHqy11RldfzZnt6txkgu_g/exec";

// 🔥 FIX: proper show/hide
function showLoader(){
  document.getElementById("loader").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

function uploadData() {
  let file = document.getElementById("thumb").files[0];

  if(!file){
    alert("Image required");
    return;
  }

  let reader = new FileReader();
  showLoader();

  reader.onload = function() {

    fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        url: document.getElementById("url").value,
        thumbnail: reader.result
      })
    })

    .then(res => res.json())
    .then(data => {
      hideLoader(); // ✅ FIXED (this was missing/bugged before)

      document.getElementById("thumb").value = "";
      document.getElementById("name").value = "";
      document.getElementById("category").value = "";
      document.getElementById("url").value = "";

      loadData();
    })

    .catch(err => {
      hideLoader(); // ✅ always hide even on error
      alert("Error: " + err);
    });
  };

  reader.readAsDataURL(file);
}

function loadData() {
  fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.reverse().forEach(d => {
      html += `
        <tr>
          <td>${d.Name || ""}</td>
          <td>${d.Category || ""}</td>
          <td>${d.URL || ""}</td>
          <td><img src="${d.Thumbnail || ""}"></td>
        </tr>
      `;
    });

    document.getElementById("tbody").innerHTML = html;
  });
}

loadData();

</script>

</body>
</html>
