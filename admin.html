<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel PRO</title>

<style>
body {font-family: Arial; background:#0d0d0d; color:#fff;}
.container {max-width:900px;margin:auto;}
input,button {padding:10px;margin:5px;width:100%;}
table {width:100%;margin-top:20px;border-collapse:collapse;}
td,th {border:1px solid #333;padding:8px;}
img {width:70px;}
#loader {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:20px;
}
</style>

</head>
<body>

<div id="loader">Uploading... ⏳</div>

<div class="container">
<h2>Admin Panel PRO</h2>

<input id="name" placeholder="Name">
<input id="category" placeholder="Category">
<input id="url" placeholder="URL">
<input type="file" id="thumb">

<button onclick="addData()">Add Data</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>URL</th>
<th>Thumbnail</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwm5huDUld4_MMX_0jdu1JcMVAnnRCHyDPHJSH5Tqoe6rowI6whX5N7FVAh_YZg8xqgXg/exec";

function showLoader() {
  document.getElementById("loader").style.display = "flex";
}

function hideLoader() {
  document.getElementById("loader").style.display = "none";
}

function addData() {
  let name = document.getElementById("name").value;
  let category = document.getElementById("category").value;
  let url = document.getElementById("url").value;
  let file = document.getElementById("thumb").files[0];

  if (!name || !file) {
    alert("Name aur Image zaroori hai!");
    return;
  }

  let reader = new FileReader();

  showLoader();

  reader.onload = function() {
    fetch(API, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        category: category,
        url: url,
        thumbnail: reader.result
      })
    })
    .then(res => res.json())
    .then(res => {
      hideLoader();
      loadData();
      document.getElementById("thumb").value = "";
    })
    .catch(err => {
      hideLoader();
      alert("Error!");
    });
  };

  reader.readAsDataURL(file);
}

function loadData() {
  fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.reverse().forEach(d => {
      html += `
      <tr>
        <td>${d.Name}</td>
        <td>${d.Category}</td>
        <td>${d.URL}</td>
        <td><img src="${d.Thumbnail}"></td>
      </tr>`;
    });
    document.getElementById("tbody").innerHTML = html;
  });
}

loadData();
</script>

</body>
</html>
