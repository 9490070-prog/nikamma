<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Admin Hub | Category Video Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0e1a;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      color: #edf2ff;
      padding: 16px 12px 40px 12px;
    }
    .dashboard-container {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      background: rgba(12, 20, 32, 0.9);
      backdrop-filter: blur(12px);
      padding: 10px 18px;
      border-radius: 48px;
      border: 1px solid rgba(0, 170, 255, 0.35);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }
    .logo-area h2 {
      font-size: clamp(1rem, 5.5vw, 1.6rem);
      font-weight: 700;
      background: linear-gradient(125deg, #00ccff, #4d9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-area p {
      font-size: 0.6rem;
      color: #8e9bbe;
    }
    .add-global-btn {
      background: linear-gradient(95deg, #0a9eff, #006bb3);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      font-size: 26px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0, 170, 255, 0.4);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-global-btn:hover {
      transform: scale(0.97);
      background: #2ab4ff;
    }
    .category-card {
      background: #0f1624;
      border-radius: 28px;
      padding: 14px 0 18px 0;
      margin-bottom: 36px;
      border: 1px solid #222b44;
      transition: 0.2s;
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.6);
    }
    .category-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0 18px 12px 18px;
      border-bottom: 2px solid rgba(0, 170, 255, 0.5);
      margin-bottom: 16px;
    }
    .category-title {
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      font-weight: 700;
      background: linear-gradient(130deg, #f0f9ff, #9acdff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .category-badge {
      background: #1f2a44;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #bbd9ff;
    }
    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      gap: 16px;
      padding: 8px 18px 20px 18px;
      scrollbar-width: thin;
      scrollbar-color: #00aaff #20273f;
      -webkit-overflow-scrolling: touch;
    }
    .horizontal-scroll::-webkit-scrollbar {
      height: 5px;
    }
    .horizontal-scroll::-webkit-scrollbar-track {
      background: #1a2235;
      border-radius: 12px;
    }
    .horizontal-scroll::-webkit-scrollbar-thumb {
      background: #00aaff;
      border-radius: 12px;
    }
    .video-card {
      min-width: 230px;
      width: 230px;
      background: #0b1120;
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #2a3452;
      flex-shrink: 0;
      cursor: pointer;
    }
    @media (max-width: 550px) {
      .video-card { min-width: 190px; width: 190px; }
      .thumb-wrapper { height: 118px; }
      .video-name { font-size: 0.85rem; }
      .small-edit, .small-delete { padding: 4px 10px; font-size: 0.65rem; }
    }
    @media (max-width: 430px) {
      .video-card { min-width: 170px; width: 170px; }
      .thumb-wrapper { height: 105px; }
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 28px -12px #00aaff30;
      border-color: #00aaff99;
    }
    .thumb-wrapper {
      width: 100%;
      height: 130px;
      background: #05080f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.25s;
    }
    .video-info {
      padding: 10px 10px 12px;
    }
    .video-name {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-url {
      font-size: 0.6rem;
      color: #7a86a6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .video-actions {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }
    .small-edit, .small-delete {
      font-size: 0.68rem;
      padding: 5px 11px;
      border-radius: 30px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.1s;
    }
    .small-edit { background: #ffaa33; color: #101010; }
    .small-delete { background: #e34d4d; color: white; }
    .empty-cat-msg {
      color: #6c7aa3;
      font-style: italic;
      padding: 20px 16px;
      background: #0c1120;
      border-radius: 40px;
      text-align: center;
      margin: 0 18px;
      font-size: 0.8rem;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(12px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 16px;
    }
    .modal-panel {
      background: #121b2c;
      max-width: 500px;
      width: 100%;
      border-radius: 40px;
      padding: 20px 20px 28px;
      border: 1px solid #2c4670;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5);
    }
    .modal-panel h3 {
      font-size: 1.5rem;
      margin-bottom: 18px;
      color: #2fd0ff;
    }
    .modal-panel input, .modal-panel select {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      background: #0a1020;
      border: 1px solid #2c3e62;
      border-radius: 60px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .img-edit-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #0a1020;
      padding: 5px 14px;
      border-radius: 60px;
      margin: 14px 0;
    }
    .icon-edit-btn {
      background: #28a87a;
      border: none;
      border-radius: 40px;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }
    .modal-buttons button {
      flex: 1;
      padding: 11px;
      border-radius: 50px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    .btn-save-item { background: #00aaff; color: white; }
    .btn-cancel-modal { background: #ff4d4d; color: white; }
    .progress-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
      z-index: 3000;
      flex-direction: column;
    }
    .progress-card {
      background: #101a28;
      padding: 24px 28px;
      border-radius: 48px;
      text-align: center;
      min-width: 260px;
      width: 80%;
      max-width: 340px;
      border: 1px solid #00aaff66;
    }
    .progress-bar-container {
      width: 100%;
      height: 26px;
      background: #1e2a3a;
      border-radius: 40px;
      overflow: hidden;
      margin: 18px 0;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00aaff, #2ad4ff);
      transition: width 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    #progressStatusText { color: #bbd4ff; font-weight: 500; font-size: 0.85rem; }
    .toast-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      left: auto;
      background: #1f2a44;
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(12px);
      border-left: 5px solid #00ffaa;
      z-index: 3500;
      display: none;
      font-weight: 500;
      font-size: 0.85rem;
      box-shadow: 0 6px 14px black;
    }
    @media (max-width: 550px) {
      .toast-msg { left: 16px; right: 16px; text-align: center; }
    }
    .crop-modal-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.98);
      backdrop-filter: blur(10px);
      z-index: 4000;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    .crop-inner {
      background: #0f1725;
      width: 96%;
      max-width: 1000px;
      border-radius: 32px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      max-height: 92vh;
    }
    .crop-canvas-area {
      background: #03060c;
      border-radius: 24px;
      padding: 10px;
      display: flex;
      justify-content: center;
      min-height: 200px;
      max-height: 40vh;
      overflow: hidden;
    }
    .canvas-relative { position: relative; display: inline-block; }
    #cropCanvas { display: block; border-radius: 16px; background: #1a1f30; max-width: 100%; height: auto; }
    #cropSelectionBox {
      position: absolute;
      border: 3px solid #ffaa44;
      background: rgba(255, 170, 68, 0.2);
      pointer-events: none;
      box-sizing: border-box;
    }
    .scroll-controls-area { flex: 1; overflow-y: auto; margin-top: 16px; padding-right: 5px; max-height: 38vh; }
    .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    @media (max-width: 580px) { .control-grid { grid-template-columns: 1fr; gap: 10px; } }
    .ctrl-group label { font-size: 12px; font-weight: 500; color: #9bb5ff; }
    .ctrl-group input { width: 100%; margin: 6px 0; }
    .crop-buttons { display: flex; gap: 14px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .crop-buttons button { padding: 8px 22px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="admin-header">
    <div class="logo-area">
      <h2>🎬 ADMIN DASHBOARD</h2>
      <p>Video manager • Category hub</p>
    </div>
    <button class="add-global-btn" id="openAddGlobalBtn" title="Add new video">+</button>
  </div>
  <div id="categoriesContainer" class="categories-section"></div>
</div>

<!-- MODAL -->
<div id="globalModal" class="modal-overlay">
  <div class="modal-panel">
    <h3 id="modalTitle">➕ Add Video</h3>
    <input type="text" id="videoName" placeholder="Video title *">
    <select id="videoCategorySelect">
      <option value="">-- Category --</option>
      <option value="Live">Live</option><option value="Movies">Movies</option>
      <option value="Drama">Drama</option><option value="Slider">Slider</option>
      <option value="Sports">Sports</option><option value="Tv Show">Tv Show</option>
    </select>
    <input type="text" id="videoUrl" placeholder="Video URL *">
    <div class="img-edit-row">
      <button type="button" id="openMiniImageBtn" class="icon-edit-btn">🎨 Crop</button>
      <input type="file" id="thumbFile" accept="image/*">
    </div>
    <div class="modal-buttons">
      <button id="modalSubmitBtn" class="btn-save-item">Save</button>
      <button id="closeModalBtn" class="btn-cancel-modal">Cancel</button>
    </div>
  </div>
</div>

<!-- PROGRESS OVERLAY -->
<div id="progressOverlay" class="progress-overlay">
  <div class="progress-card">
    <h4 style="color:#00aaff;">⚙️ Processing</h4>
    <div class="progress-bar-container">
      <div class="progress-fill" id="progressFillBar">0%</div>
    </div>
    <div id="progressStatusText">Please wait...</div>
  </div>
</div>

<!-- CROP MODAL -->
<div id="cropToolModal" class="crop-modal-container">
  <div class="crop-inner">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h4 style="color:#00aaff;">✂️ Image Editor (Crop & Resize)</h4>
      <button id="closeCropModalBtn" style="background:#ff5555; border:none; padding:5px 16px; border-radius:40px;">✖️</button>
    </div>
    <div class="crop-canvas-area">
      <div class="canvas-relative">
        <canvas id="cropCanvas" width="450" height="280"></canvas>
        <div id="cropSelectionBox"></div>
      </div>
    </div>
    <div class="scroll-controls-area">
      <div class="control-grid">
        <div class="ctrl-group"><label>⬅️ X Position</label><input type="range" id="cropXSlider" min="0" max="100" step="1"><span id="xPosVal" style="font-size:11px;">0px</span></div>
        <div class="ctrl-group"><label>⬆️ Y Position</label><input type="range" id="cropYSlider" min="0" max="100" step="1"><span id="yPosVal" style="font-size:11px;">0px</span></div>
        <div class="ctrl-group"><label>📏 Crop Width</label><input type="range" id="cropWidthSlider" min="30" max="800" step="5"><span id="widthVal">240px</span></div>
        <div class="ctrl-group"><label>📐 Crop Height</label><input type="range" id="cropHeightSlider" min="30" max="800" step="5"><span id="heightVal">180px</span></div>
        <div class="ctrl-group"><label>🔍 Zoom</label><input type="range" id="zoomScaleSlider" min="10" max="250" step="5"><span id="zoomPercent">40%</span></div>
      </div>
    </div>
    <div class="crop-buttons">
      <button id="applyCropSaveBtn" style="background:#2ecc71;">💾 Save Cropped</button>
      <button id="cancelCropToolBtn" style="background:#777;">Cancel</button>
    </div>
  </div>
</div>

<div id="toastMessage" class="toast-msg"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbylg5tN7DQQwioDrhWtHHEzPh1oqpzqkvBxY_dzwPBCoToAwXwperoy0IWblfWiPFtU2A/exec";
  let allVideos = [];
  let currentEditRow = null;
  let isEditMode = false;
  let existingThumbBackup = null;

  function showProgress(show, percent = 0, msg = "Processing...") {
    const overlay = document.getElementById("progressOverlay");
    if (show) {
      overlay.style.display = "flex";
      const fill = document.getElementById("progressFillBar");
      fill.style.width = percent + "%";
      fill.innerText = Math.floor(percent) + "%";
      document.getElementById("progressStatusText").innerText = msg;
    } else {
      overlay.style.display = "none";
    }
  }

  function updateProgress(percent, msg) {
    const fill = document.getElementById("progressFillBar");
    fill.style.width = percent + "%";
    fill.innerText = Math.floor(percent) + "%";
    document.getElementById("progressStatusText").innerText = msg;
  }

  function showToast(text, type = "success") {
    const toast = document.getElementById("toastMessage");
    toast.style.display = "block";
    toast.innerText = text;
    toast.style.background = type === "error" ? "#d13a3a" : "#1f6e43";
    setTimeout(() => { toast.style.display = "none"; }, 2800);
  }

  async function loadData() {
    try {
      showProgress(true, 15, "Fetching data...");
      const res = await fetch(API_URL);
      const data = await res.json();
      if (Array.isArray(data)) {
        allVideos = data.map(item => ({
          rowNumber: item.rowNumber, 
          Name: item.Name || "", 
          Category: item.Category || "", 
          URL: item.URL || "#", 
          Thumbnail: item.Thumbnail || null
        }));
      } else { allVideos = []; }
      updateProgress(100, "Rendering...");
      setTimeout(() => showProgress(false), 400);
      renderCategories();
    } catch (e) { 
      showProgress(false); 
      showToast("Load error", "error"); 
      allVideos = []; 
      renderCategories(); 
    }
  }

  function getUniqueCategories() {
    let cats = new Set();
    allVideos.forEach(v => { if (v.Category) cats.add(v.Category); });
    let order = ["Sports", "Tv Show", "Live", "Movies", "Drama", "Slider"];
    return Array.from(cats).sort((a,b) => {
      let ia = order.indexOf(a), ib = order.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;
      return a.localeCompare(b);
    });
  }

  function escapeHtml(str) { 
    if (!str) return ''; 
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
  }

  function renderCategories() {
    const container = document.getElementById("categoriesContainer");
    const categories = getUniqueCategories();
    if (categories.length === 0) {
      container.innerHTML = `<div style="background:#0f1624; border-radius:38px; padding:34px; text-align:center;">✨ No categories. Click + to add ✨</div>`;
      return;
    }
    let html = "";
    for (let cat of categories) {
      const videos = allVideos.filter(v => v.Category === cat);
      html += `<div class="category-card"><div class="category-header"><span class="category-title">${escapeHtml(cat)}</span><span class="category-badge">${videos.length} video${videos.length !== 1 ? 's' : ''}</span></div><div class="horizontal-scroll">`;
      if (videos.length === 0) {
        html += `<div class="empty-cat-msg">📭 No videos yet.</div>`;
      } else {
        for (let v of videos) {
          const thumb = v.Thumbnail && v.Thumbnail.trim() ? v.Thumbnail : "https://placehold.co/300x180/1a2340/white?text=No+Image";
          html += `<div class="video-card" data-video='${JSON.stringify(v)}'>
            <div class="thumb-wrapper"><img src="${thumb}" loading="lazy" onerror="this.src='https://placehold.co/300x180/2a3555/white?text=error'"></div>
            <div class="video-info"><div class="video-name">${escapeHtml(v.Name)}</div><div class="video-url">${v.URL.length > 42 ? v.URL.substring(0,40)+'...' : v.URL}</div><div class="video-actions">
            <button class="small-edit" data-row="${v.rowNumber}" data-name="${escapeHtml(v.Name)}" data-cat="${escapeHtml(v.Category)}" data-url="${escapeHtml(v.URL)}" data-thumb="${v.Thumbnail || ''}">✏️ Edit</button>
            <button class="small-delete" data-row="${v.rowNumber}" data-name="${escapeHtml(v.Name)}">🗑️ Del</button></div></div></div>`;
        }
      }
      html += `</div></div>`;
    }
    container.innerHTML = html;
    attachCardEvents();
  }

  function attachCardEvents() {
    document.querySelectorAll(".small-edit").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openEditModal(parseInt(btn.dataset.row), btn.dataset.name, btn.dataset.cat, btn.dataset.url, btn.dataset.thumb);
      });
    });
    document.querySelectorAll(".small-delete").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        e.stopPropagation();
        if (confirm(`Delete "${btn.dataset.name}" ?`)) await deleteVideo(parseInt(btn.dataset.row));
      });
    });
    document.querySelectorAll(".video-card").forEach(card => {
      card.addEventListener("click", (e) => {
        if (e.target.classList.contains("small-edit") || e.target.classList.contains("small-delete")) return;
        try { const v = JSON.parse(card.getAttribute("data-video")); if (v.URL) window.open(v.URL, "_blank"); } catch(e) {}
      });
    });
  }

  async function deleteVideo(rowNumber) {
    showProgress(true, 30, "Deleting...");
    try {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "DELETE", rowNumber }) });
      const result = await res.json();
      if (result.status === "DELETED") { 
        showToast("Deleted!"); 
        await loadData(); 
      } else { 
        showToast("Delete failed", "error"); 
      }
    } catch(e) { showToast("Error", "error"); }
    showProgress(false);
  }

  function openAddModal() { 
    isEditMode = false; 
    currentEditRow = null; 
    existingThumbBackup = null;
    document.getElementById("modalTitle").innerHTML = "➕ Add New Video";
    document.getElementById("modalSubmitBtn").innerHTML = "Add";
    document.getElementById("modalSubmitBtn").style.background = "#00aaff";
    document.getElementById("videoName").value = ""; 
    document.getElementById("videoCategorySelect").value = ""; 
    document.getElementById("videoUrl").value = ""; 
    document.getElementById("thumbFile").value = ""; 
    document.getElementById("globalModal").style.display = "flex"; 
  }
  
  function openEditModal(row, name, cat, url, thumb) { 
    isEditMode = true; 
    currentEditRow = row; 
    existingThumbBackup = thumb; 
    document.getElementById("modalTitle").innerHTML = "✏️ Edit Video";
    document.getElementById("modalSubmitBtn").innerHTML = "Update";
    document.getElementById("modalSubmitBtn").style.background = "#ffaa33";
    document.getElementById("videoName").value = name; 
    document.getElementById("videoCategorySelect").value = cat; 
    document.getElementById("videoUrl").value = url; 
    document.getElementById("thumbFile").value = ""; 
    document.getElementById("globalModal").style.display = "flex"; 
  }

  async function submitVideo() {
    const name = document.getElementById("videoName").value.trim();
    const category = document.getElementById("videoCategorySelect").value;
    const url = document.getElementById("videoUrl").value.trim();
    const file = document.getElementById("thumbFile").files[0];
    
    if (!name || !category || !url) { 
      showToast("Fill all fields", "error"); 
      return; 
    }
    
    document.getElementById("globalModal").style.display = "none";
    showProgress(true, 20, "Preparing...");
    
    const getBase64 = (f) => new Promise(resolve => { 
      if (!f) resolve(null); 
      else { const rd = new FileReader(); rd.onload = () => resolve(rd.result); rd.readAsDataURL(f); } 
    });
    
    let thumbBase64 = null;
    if (file) thumbBase64 = await getBase64(file);
    else if (isEditMode && existingThumbBackup && !file) thumbBase64 = existingThumbBackup;
    
    // EDIT MODE - UPDATE existing data
    if (isEditMode && currentEditRow) {
      if (!thumbBase64) { 
        showProgress(false); 
        showToast("Thumbnail required", "error"); 
        return; 
      }
      
      updateProgress(50, "Updating video...");
      
      // METHOD 1: Direct UPDATE payload
      let payload = { 
        action: "EDIT", 
        rowNumber: currentEditRow, 
        name: name, 
        category: category, 
        url: url, 
        thumbnail: thumbBase64 
      };
      
      try {
        console.log("EDIT payload:", payload);
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        console.log("EDIT response:", result);
        updateProgress(95, "Finalizing...");
        
        if (result.status === "UPDATED" || result.status === "OK") { 
          showToast("Video updated successfully!"); 
          await loadData(); 
        } else { 
          showToast("Update failed: " + JSON.stringify(result), "error"); 
        }
      } catch(e) { 
        console.error(e);
        showToast("Update error: " + e.message, "error"); 
      }
    } 
    // ADD MODE - Create new entry
    else {
      if (!thumbBase64) { 
        showProgress(false); 
        showToast("Thumbnail required for new video", "error"); 
        return; 
      }
      
      updateProgress(50, "Adding new video...");
      let payload = { name, category, url, thumbnail: thumbBase64 };
      
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "OK") { 
          showToast("Video added successfully!"); 
          await loadData(); 
        } else { 
          showToast("Add failed: " + JSON.stringify(result), "error"); 
        }
      } catch(e) { 
        showToast("Add error: " + e.message, "error"); 
      }
    }
    
    showProgress(false);
  }

  // ========== CROPPER ==========
  let cropImg = new Image();
  let naturalW = 1, naturalH = 1;
  let zoomVal = 0.5, cropW = 240, cropH = 180, cropX = 0, cropY = 0;

  function openCropper(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        cropImg = new Image();
        cropImg.onload = () => {
          naturalW = cropImg.width; naturalH = cropImg.height;
          zoomVal = 0.45; cropW = Math.min(380, naturalW); cropH = Math.min(260, naturalH);
          cropX = 0; cropY = 0;
          document.getElementById("zoomScaleSlider").value = zoomVal * 100;
          document.getElementById("cropWidthSlider").value = cropW;
          document.getElementById("cropHeightSlider").value = cropH;
          document.getElementById("cropToolModal").style.display = "flex";
          drawCropCanvas();
        };
        cropImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function drawCropCanvas() {
    if (!cropImg.complete) return;
    const canvas = document.getElementById("cropCanvas");
    const ctx = canvas.getContext("2d");
    let dispW = naturalW * zoomVal, dispH = naturalH * zoomVal;
    canvas.width = dispW; canvas.height = dispH;
    ctx.clearRect(0, 0, dispW, dispH);
    ctx.drawImage(cropImg, 0, 0, dispW, dispH);
    const box = document.getElementById("cropSelectionBox");
    box.style.left = (cropX * zoomVal) + "px";
    box.style.top = (cropY * zoomVal) + "px";
    box.style.width = Math.max(2, cropW * zoomVal) + "px";
    box.style.height = Math.max(2, cropH * zoomVal) + "px";
    document.getElementById("xPosVal").innerText = Math.round(cropX) + "px";
    document.getElementById("yPosVal").innerText = Math.round(cropY) + "px";
    document.getElementById("widthVal").innerText = Math.round(cropW) + "px";
    document.getElementById("heightVal").innerText = Math.round(cropH) + "px";
    document.getElementById("zoomPercent").innerText = Math.round(zoomVal * 100) + "%";
    let maxX = Math.max(0, naturalW - cropW);
    let maxY = Math.max(0, naturalH - cropH);
    document.getElementById("cropXSlider").max = maxX;
    document.getElementById("cropYSlider").max = maxY;
    document.getElementById("cropXSlider").value = Math.min(maxX, cropX);
    document.getElementById("cropYSlider").value = Math.min(maxY, cropY);
    document.getElementById("cropWidthSlider").max = naturalW;
    document.getElementById("cropHeightSlider").max = naturalH;
  }

  function applyCrop() {
    let finalX = Math.min(cropX, naturalW - cropW);
    let finalY = Math.min(cropY, naturalH - cropH);
    let finalW = Math.min(cropW, naturalW - finalX);
    let finalH = Math.min(cropH, naturalH - finalY);
    if (finalW <= 0 || finalH <= 0) { showToast("Invalid crop", "error"); return; }
    const tmpCanvas = document.createElement("canvas");
    tmpCanvas.width = finalW; tmpCanvas.height = finalH;
    const tctx = tmpCanvas.getContext("2d");
    tctx.drawImage(cropImg, finalX, finalY, finalW, finalH, 0, 0, finalW, finalH);
    tmpCanvas.toBlob(blob => {
      const croppedFile = new File([blob], "cropped.jpg", { type: "image/jpeg" });
      const dt = new DataTransfer();
      dt.items.add(croppedFile);
      document.getElementById("thumbFile").files = dt.files;
      showToast("Crop applied!", "success");
      document.getElementById("cropToolModal").style.display = "none";
    }, "image/jpeg", 0.9);
  }

  ["cropXSlider","cropYSlider","cropWidthSlider","cropHeightSlider","zoomScaleSlider"].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener("input", (e) => {
      if(id === "cropXSlider") cropX = parseFloat(e.target.value);
      if(id === "cropYSlider") cropY = parseFloat(e.target.value);
      if(id === "cropWidthSlider") cropW = parseFloat(e.target.value);
      if(id === "cropHeightSlider") cropH = parseFloat(e.target.value);
      if(id === "zoomScaleSlider") zoomVal = parseFloat(e.target.value) / 100;
      drawCropCanvas();
    });
  });

  document.getElementById("openMiniImageBtn")?.addEventListener("click", () => {
    const inp = document.getElementById("thumbFile");
    if(inp.files && inp.files[0]) openCropper(inp.files[0]);
    else showToast("Select an image first", "error");
  });
  document.getElementById("applyCropSaveBtn")?.addEventListener("click", applyCrop);
  document.getElementById("cancelCropToolBtn")?.addEventListener("click", () => document.getElementById("cropToolModal").style.display = "none");
  document.getElementById("closeCropModalBtn")?.addEventListener("click", () => document.getElementById("cropToolModal").style.display = "none");
  document.getElementById("openAddGlobalBtn").onclick = () => openAddModal();
  document.getElementById("closeModalBtn").onclick = () => document.getElementById("globalModal").style.display = "none";
  document.getElementById("modalSubmitBtn").onclick = () => submitVideo();

  loadData();
</script>
</body>
</html>
