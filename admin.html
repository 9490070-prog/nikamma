<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikamma 4K | Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg-dark: #080a0c; --card-bg: #111418; --sidebar: #0d1117; --text-main: #e0e6ed; --border: #21262d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar Toggle Logic */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 25px; transition: 0.3s; position: fixed; height: 100vh; z-index: 1001; }
        .sidebar.closed { left: -260px; }
        .main { flex: 1; padding: 30px; margin-left: 260px; transition: 0.3s; width: 100%; }
        .main.full { margin-left: 0; }

        @media (max-width: 768px) {
            .sidebar { left: -260px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
        }

        .brand { font-size: 22px; font-weight: 700; margin-bottom: 40px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .nav-link { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; color: #8b949e; }
        .nav-link:hover, .nav-link.active { background: rgba(0, 210, 255, 0.1); color: var(--primary); }

        /* Header Components */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .toggle-btn { background: var(--card-bg); border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        /* Grid UI */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; }
        .card-preview { height: 140px; background-size: cover; background-position: center; border-bottom: 1px solid var(--border); }
        .card-body { padding: 15px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; background: #21262d; color: #fff; }

        /* Modal UI */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #161b22; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; }

        #loader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 700; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loader">Syncing...</div>

<div class="sidebar" id="mySidebar">
    <div class="brand">NIKAMMA <span>4K</span> <i class="fa fa-times" onclick="toggleSidebar()" style="cursor:pointer; font-size: 18px; color:#555;"></i></div>
    <div class="nav-link active" onclick="location.reload()"><i class="fa fa-home"></i> Dashboard</div>
    <div class="nav-link" onclick="openModal('settingsModal')"><i class="fa fa-cog"></i> API Settings</div>
</div>

<div class="main" id="mainContent">
    <div class="top-nav">
        <button class="toggle-btn" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
        <div style="display:flex; gap:10px;">
            <button class="toggle-btn" onclick="fetchData()"><i class="fa fa-sync"></i> Refresh</button>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>
</div>

<button style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:var(--primary); border:none; font-size:24px; cursor:pointer; box-shadow: 0 5px 20px rgba(0,210,255,0.4);" onclick="openAddModal()">+</button>

<div class="modal" id="formModal">
    <div class="modal-content">
        <h3 id="modal-title">Content Manager</h3>
        <input type="text" id="inp-name" placeholder="Title">
        <select id="inp-cat">
            <option value="Movies">🎬 Movies</option>
            <option value="Sports">⚽ Sports</option>
            <option value="Slider">🖼️ Slider</option>
        </select>
        <input type="text" id="inp-url" placeholder="M3U8 / MP4 URL">
        
        <div style="background: #0d1117; border: 1px dashed var(--border); padding: 15px; border-radius: 10px; text-align: center; margin: 10px 0;">
            <input type="file" id="fileInp" hidden accept="image/*" onchange="uploadImage(this)">
            <button type="button" onclick="document.getElementById('fileInp').click()" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fa fa-upload"></i> Upload Image (Android 14+)</button>
            <p id="fileStatus" style="font-size: 10px; color: #555; margin-top:5px;">Select thumbnail</p>
        </div>
        
        <input type="text" id="inp-thumb" placeholder="Thumbnail URL">
        <button class="btn-main" onclick="saveItem()">SAVE CONTENT</button>
        <button onclick="closeModal('formModal')" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>System Config</h3>
        <input type="text" id="api-url-inp" placeholder="Paste Apps Script URL">
        <button class="btn-main" onclick="saveSettings()">CONNECT</button>
    </div>
</div>

<script>
    let API_URL = localStorage.getItem('nikamma_api') || '';
    let editContext = { active: false, row: null };

    // Sidebar Toggle
    function toggleSidebar() {
        const sb = document.getElementById('mySidebar');
        const mc = document.getElementById('mainContent');
        sb.classList.toggle('open');
        sb.classList.toggle('closed');
        mc.classList.toggle('full');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveSettings() {
        let url = document.getElementById('api-url-inp').value;
        if(url.includes('exec')) {
            localStorage.setItem('nikamma_api', url);
            API_URL = url;
            closeModal('settingsModal');
            fetchData();
        }
    }

    async function uploadImage(input) {
        if(!input.files[0]) return;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('fileStatus').innerText = "Uploading...";
        
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            try {
                const res = await fetch(`${API_URL}?action=uploadFile&filename=${encodeURIComponent(file.name)}&mimeType=${file.type}&data=${encodeURIComponent(base64)}`);
                const result = await res.json();
                if(result.success) {
                    document.getElementById('inp-thumb').value = result.url;
                    document.getElementById('fileStatus').innerText = "Upload Success!";
                }
            } catch(err) { alert("Upload Failed!"); }
            document.getElementById('loader').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function fetchData() {
        if(!API_URL) return openModal('settingsModal');
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`${API_URL}?action=getData&t=${Date.now()}`);
            const data = await res.json();
            renderGrid(data);
        } catch(e) { console.log(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderGrid(data) {
        let html = '';
        data.forEach((item, idx) => {
            html += `
            <div class="item-card">
                <div class="card-preview" style="background-image: url('${item.Thumbnail || ''}')"></div>
                <div class="card-body">
                    <span style="font-size:10px; color:var(--primary)">${item.Category}</span>
                    <div style="font-weight:500; margin:5px 0;">${item.Name}</div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-icon" onclick="openEdit(${idx+2}, ${JSON.stringify(item).replace(/"/g, '&quot;')})"><i class="fa fa-edit"></i></button>
                        <button class="btn-icon" onclick="deleteItem(${idx+2})" style="color:red;"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('main-grid').innerHTML = html;
    }

    async function saveItem() {
        document.getElementById('loader').style.display = 'block';
        const params = new URLSearchParams({
            action: 'saveData',
            action_type: editContext.active ? 'update' : 'add',
            rowIndex: editContext.row,
            Name: document.getElementById('inp-name').value,
            Category: document.getElementById('inp-cat').value,
            URL: document.getElementById('inp-url').value,
            Thumbnail: document.getElementById('inp-thumb').value,
            Unique_Id: editContext.active ? editContext.uid : 'ID_'+Date.now()
        });
        await fetch(API_URL + '?' + params.toString());
        closeModal('formModal');
        fetchData();
    }

    function openAddModal() {
        editContext = { active: false };
        ['inp-name', 'inp-url', 'inp-thumb'].forEach(id => document.getElementById(id).value = '');
        openModal('formModal');
    }

    function openEdit(row, item) {
        editContext = { active: true, row: row, uid: item.Unique_Id };
        document.getElementById('inp-name').value = item.Name;
        document.getElementById('inp-cat').value = item.Category;
        document.getElementById('inp-url').value = item.URL;
        document.getElementById('inp-thumb').value = item.Thumbnail;
        openModal('formModal');
    }

    async function deleteItem(row) {
        if(!confirm("Delete?")) return;
        document.getElementById('loader').style.display = 'block';
        await fetch(`${API_URL}?action=deleteData&rowIndex=${row}`);
        fetchData();
    }

    window.onload = () => { if(API_URL) fetchData(); else openModal('settingsModal'); };
</script>
</body>
</html>
