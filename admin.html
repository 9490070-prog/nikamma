<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nikamma 4k Pro Admin - Ultimate CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00bcd4;
            --bg-dark: #0a0c10;
            --card-bg: #12161c;
            --border: #2a313c;
            --text-primary: #f0f3f8;
            --danger: #ff5c5c;
            --success: #4caf50;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding-bottom: 90px;
        }

        #processing-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,12,16,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .spinner {
            width: 52px;
            height: 52px;
            border: 5px solid #2a313c;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--primary);
            z-index: 10001;
            transition: width 0.25s;
            width: 0%;
        }

        .header {
            background: var(--card-bg);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-icon i {
            font-size: 22px;
            color: white;
        }
        
        .logo-text h1 { font-size: 1.3rem; font-weight: 800; margin: 0; }
        .logo-text span { color: var(--primary); }
        .logo-text p { font-size: 10px; color: #888; margin: 0; }
        
        .refresh-btn {
            background: rgba(0,188,212,0.12);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 7px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: rgba(0,188,212,0.25); }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 14px 20px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .tab-btn {
            padding: 8px 20px;
            background: transparent;
            border: none;
            color: #a0aab8;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: #000;
        }

        .content-area { padding: 20px; }
        
        .table-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }
        
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        
        th {
            background: rgba(0,188,212,0.05);
            color: var(--primary);
            font-size: 12px;
        }
        
        .thumb {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            background: #1a1f2a;
            display: block;
            transition: transform 0.2s;
        }
        .thumb:hover { transform: scale(1.05); }
        
        .action-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            margin: 0 2px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .action-btn:hover { background: rgba(255,255,255,0.1); }
        .edit-i { color: var(--primary); }
        .del-i { color: var(--danger); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #1a1f2a;
            width: 92%;
            max-width: 520px;
            padding: 24px;
            border-radius: 28px;
            border: 1px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 6px 0 14px;
            background: #0f131c;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 16px;
            font-family: inherit;
            font-size: 13px;
        }
        
        label {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
            display: block;
        }
        
        .btn-save {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-save:active { transform: scale(0.98); }
        
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            cursor: pointer;
            font-size: 24px;
            z-index: 999;
            box-shadow: 0 4px 12px rgba(0,188,212,0.3);
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.95); }
        
        .badge-cat {
            background: #1e2a36;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            display: inline-block;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            z-index: 11000;
            animation: slideUp 0.3s ease;
        }
        
        .toast.error { background: #e04444; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .image-preview-area {
            margin: 8px 0;
            padding: 10px;
            background: #0f131c;
            border-radius: 14px;
            text-align: center;
            display: none;
        }
        .image-preview-area img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        
        .empty-row {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }
        
        .image-upload-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .image-upload-wrapper input[type="file"] {
            flex: 1;
            margin: 0;
            background: #0f131c;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .crop-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000ee;
            z-index: 20000;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .crop-card {
            background: #1a1f2a;
            border-radius: 30px;
            max-width: 550px;
            width: 100%;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .crop-canvas-container {
            background: #2c2c2c;
            border-radius: 20px;
            padding: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        canvas {
            background: #333;
            border-radius: 12px;
            max-width: 100%;
            height: auto;
            cursor: move;
        }
        .crop-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .crop-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-crop-apply { background: #0f7b3a; color: white; }
        .btn-crop-cancel { background: #3a3a3a; color: white; }
        
        .crop-btn {
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            border: none;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .crop-btn:hover { opacity: 0.9; transform: scale(0.98); }
        
        .slider-group { margin-bottom: 12px; }
        .slider-group label { font-size: 11px; margin-bottom: 4px; }
        input[type="range"] { margin: 0; }
        
        .drive-note {
            background: rgba(0,188,212,0.1);
            padding: 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-top: 8px;
            text-align: center;
        }
        
        .url-cell {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .url-cell:hover {
            white-space: normal;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div id="processing-overlay">
    <div class="spinner"></div>
    <p>Processing...</p>
</div>
<div class="loader-bar" id="loader"></div>

<div class="header">
    <div class="logo-area">
        <div class="logo-icon" id="logoIcon">
            <i class="fa fa-film"></i>
        </div>
        <div class="logo-text">
            <h1><span>Nikamma 4k</span> Pro Admin</h1>
            <p>Content Management System</p>
        </div>
    </div>
    <button class="refresh-btn" onclick="refreshData()"><i class="fa fa-sync-alt"></i> Refresh Data</button>

<div class="tabs">

</div>

<div class="content-area">
    <div class="table-card">

            <thead>

         </>
        <table id="table-set" style="display:none">
            <thead>
                <tr><th>APP NAME</th><th>BASE URL</th><th>VERSION</th><th>UPDATE URL</th><th>ACTION</th> </tr>

                <tr><td colspan="5" class="empty-row">Loading settings...</td></tr>
            </tbody>
         </>
    </div>
</div>

<div class="fab" onclick="openAddModal()"><i class="fa fa-plus"></i></div>

<!-- CROP EDITOR MODAL -->
<div id="cropModal" class="crop-modal">
    <div class="crop-card">
        <h3 style="text-align:center; margin-bottom:12px;">✂️ Crop Image</h3>
        <div class="crop-canvas-container">
            <canvas id="cropCanvas" width="400" height="400"></canvas>
        </div>
        <div class="slider-group">
            <label>Zoom <span id="zoomVal" class="badge-cat">100%</span></label>

        </div>
        <div style="display:flex; gap:10px;">
            <div class="slider-group" style="flex:1">
                <label>Crop Width <span id="cropWVal" class="badge-cat">200px</span></label>
                <input type="range" id="cropWidthSlider" min="100" max="380" step="5" value="200">
            </div>
            <div class="slider-group" style="flex:1">
                <label>Crop Height <span id="cropHVal" class="badge-cat">200px</span></label>
                <input type="range" id="cropHeightSlider" min="100" max="380" step="5" value="200">

            <button class="btn-crop-cancel" id="cancelCropBtn">❌ Cancel</button>

    </div>
</div>

<!-- MAIN MODAL -->
<div class="modal" id="globalModal">
    <div class="modal-content">
        <h3 id="modal-title" style="font-size:18px;">Add/Edit Entry</h3>
        <div id="form-main-fields">
            <input type="text" id="inp-title" placeholder="Name *">

                <option value="Movies">🎬 Movies</option>

                <input type="file" id="inp-image-upload" accept="image/*" onchange="previewImageFile(this)">

            <input type="text" id="set-version" placeholder="Version">
            <input type="text" id="set-updateurl" placeholder="Update URL">
            <input type="text" id="set-ratingurl" placeholder="Rating URL">

        </div>
        <button class="btn-save" id="saveMasterBtn" onclick="performSave()">💾 SAVE</button>
        <button onclick="closeModal()" style="width:100%; margin-top:8px; background:none; border:none; color:#888; cursor:pointer; font-size:13px;">Cancel</button>
    </div>
</div>

<script>
    // ========== CRITICAL: STORE URL IN EXACT GOOGLE DRIVE THUMBNAIL FORMAT ==========
    function convertToWorkingThumbnailUrl(url) {
        if (!url) return null;
        if (url.match(/drive\.google\.com\/thumbnail\?id=[^&]+&sz=w500/)) return url;
        
        let fileId = null;
        const patterns = [
            /\/d\/([^\/]+)/, /[?&]id=([^&]+)/, /open\?id=([^&]+)/,
            /thumbnail\?id=([^&]+)/, /uc\?id=([^&]+)/, /file\/d\/([^\/]+)/
        ];
        for (const pattern of patterns) {
            const match = url.match(pattern);
            if (match && match[1]) { fileId = match[1]; break; }
        }
        
        if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w500`;
        if (url.startsWith('http') && /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(url)) return url;
        return null;
    }
    
    function extractFileIdFromUrl(url) {
        if (!url) return '';
        const match = url.match(/thumbnail\?id=([^&]+)/);
        return match ? match[1] : '';
    }
    
    // ========== CONFIGURATION ==========
    const MAIN_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=0&single=true&output=csv";
    const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=1123743396&single=true&output=csv";
    const LOGO_URL = "https://drive.google.com/thumbnail?id=1DXQpAofda-bZPS20Q-bqo6neUDznYqW9&sz=w200";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxSk62f66t50yO1YVVrk-6s_1NrKa1ZyZEd_4suD8GYcUf54qwjfircv5KICUMiUI-7/exec";
    
    let currentTab = 'main';
    let mainData = [];
    let settingsData = [];
    let editContext = { isEdit: false, rowIndex: null, oldFileId: null, oldThumbUrl: null };
    let isLoading = false;
    let pendingCroppedBlob = null;
    
    // Crop editor variables
    let cropImageLoaded = false;
    let cropOriginalImg = new Image();
    let cropCanvas = document.getElementById('cropCanvas');
    let cropCtx = cropCanvas.getContext('2d');
    
    function showProcessing(show) {
        document.getElementById('processing-overlay').style.display = show ? 'flex' : 'none';
    }
    
    function setLoader(percent) {
        document.getElementById('loader').style.width = percent + '%';
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function previewImageFile(input) {
        const previewArea = document.getElementById('imagePreviewArea');
        const previewImg = document.getElementById('previewImg');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewArea.style.display = 'block';
                pendingCroppedBlob = input.files[0];
            };
            reader.readAsDataURL(input.files[0]);
        } else {
            previewArea.style.display = 'none';
            pendingCroppedBlob = null;
        }
    }
    
    function loadLogo() {
        const logoContainer = document.getElementById('logoIcon');
        if (logoContainer) {
            const img = new Image();
            img.onload = function() { logoContainer.innerHTML = `<img src="${LOGO_URL}" alt="Logo">`; };
            img.onerror = function() { logoContainer.innerHTML = '<i class="fa fa-film"></i>'; };
            img.src = LOGO_URL;
        }
    }
    
    function refreshData() { if (!isLoading) fetchAllData(); }
    
    async function fetchAllData() {
        if (isLoading) return;
        isLoading = true;
        setLoader(20);
        showProcessing(true);
        try {
            const [mainResponse, settingsResponse] = await Promise.all([fetch(MAIN_CSV_URL), fetch(SETTINGS_CSV_URL)]);
            const mainText = await mainResponse.text();
            const mainParsed = Papa.parse(mainText, { header: true, skipEmptyLines: true });
            mainData = [];
            mainParsed.data.forEach((row, idx) => {
                if ((row.Name || row.name) || (row.URL || row.url)) {
                    const name = row.Name || row.name || "";
                    const category = row.Category || row.category || "Movies";
                    const url = row.URL || row.url || "";
                    let rawThumb = row.Thumbnail || row.thumbnail || "";
                    const workingThumb = convertToWorkingThumbnailUrl(rawThumb);
                    const finalThumb = workingThumb || 'https://via.placeholder.com/48/12161c?text=No+Img';
                    const fileId = extractFileIdFromUrl(workingThumb || rawThumb) || "";
                    mainData.push({ name, category, url, thumbnail: finalThumb, fileId, rawThumb: rawThumb, rowNum: idx + 2 });
                }
            });
            const settingsText = await settingsResponse.text();
            const settingsParsed = Papa.parse(settingsText, { header: true, skipEmptyLines: true });
            settingsData = settingsParsed.data.filter(row => row.name).map((row, idx) => ({ ...row, rowNum: idx + 2 }));
            renderCurrentTable();
            showToast(`✓ Loaded ${mainData.length} items`);
            setLoader(100);
            showProcessing(false);
        } catch (error) {
            showToast('✗ Error: ' + error.message, true);
            mainData = [];
            settingsData = [];
            renderCurrentTable();
            showProcessing(false);
        } finally { isLoading = false; }
    }
    
    // FIXED: Proper API call with response handling
    async function callAPI(action, data = null) {
        try {
            const url = `${API_BASE}?api=${action}`;
            const response = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: data ? JSON.stringify(data) : null 
            });
            
            // Try to parse response
            let result = { success: true };
            try {
                const text = await response.text();
                if (text && text.length > 0) {
                    result = JSON.parse(text);
                }
            } catch (e) {
                console.log("Response not JSON, assuming success");
            }
            
            return result;
        } catch (error) { 
            console.error("API Error:", error);
            return { success: false, error: error.message }; 
        }
    }
    
    async function performSave() {
        const saveBtn = document.getElementById('saveMasterBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ Saving...";
        setLoader(30);
        showProcessing(true);
        try {
            let imageData = null;
            let payload = { 
                sheet: currentTab === 'main' ? "Sheet1" : "settings", 
                isEdit: editContext.isEdit, 
                rowIdx: editContext.rowIndex, 
                existingFileId: editContext.oldFileId || "" 
            };
            
            if (currentTab === 'main') {
                const title = document.getElementById('inp-title').value.trim();
                const category = document.getElementById('inp-category-select').value;
                const link = document.getElementById('inp-link').value.trim();
                if (!title) throw new Error("Name required");
                if (!link) throw new Error("URL required");
                payload.title = title;
                payload.category = category;
                payload.link = link;
                
                if (pendingCroppedBlob) {
                    imageData = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve({ data: e.target.result.split(',')[1], mimeType: pendingCroppedBlob.type || 'image/jpeg', name: `img_${Date.now()}.jpg` });
                        reader.readAsDataURL(pendingCroppedBlob);
                    });
                    pendingCroppedBlob = null;
                } else {
                    const fileInput = document.getElementById('inp-image-upload');
                    if (fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        imageData = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve({ data: e.target.result.split(',')[1], mimeType: file.type, name: file.name });
                            reader.readAsDataURL(file);
                        });
                    }
                }
            } else {
                payload.name = document.getElementById('set-appname').value.trim();
                payload.url = document.getElementById('set-baseurl').value.trim();
                payload.version = document.getElementById('set-version').value.trim();
                payload.updateUrl = document.getElementById('set-updateurl').value.trim();
                payload.ratingUrl = document.getElementById('set-ratingurl').value.trim();
                payload.privacyUrl = document.getElementById('set-privacyurl').value.trim();
                payload.shareUrl = document.getElementById('set-shareurl').value.trim();
                if (!payload.name) throw new Error("App Name required");
            }
            
            if (imageData) payload.imageData = imageData;
            
            const result = await callAPI("save", payload);
            
            if (result.success) {
                showToast("✓ Saved successfully! Refreshing...");
                closeModal();
                await fetchAllData(); // Refresh immediately after save
            } else {
                throw new Error(result.error || "Save failed");
            }
        } catch (err) {
            showToast(err.message, true);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "💾 SAVE";
            setLoader(100);
            showProcessing(false);
        }
    }
    
    async function deleteRecordItem(sheetName, rowIndex, fileId) {
        if (!confirm("⚠️ Delete this item permanently?")) return;
        showProcessing(true);
        try {
            const result = await callAPI("delete", { rowIndex, fileId, sheetName });
            if (result.success) {
                showToast("✓ Deleted successfully! Refreshing...");
                await fetchAllData(); // Refresh immediately after delete
            } else {
                throw new Error(result.error || "Delete failed");
            }
        } catch (error) {
            showToast("✗ Delete failed: " + error.message, true);
            showProcessing(false);
        }
    }
    
    // ========== CROP EDITOR FUNCTIONS ==========
    function drawCropCanvas() {
        if (!cropImageLoaded) return;
        cropCtx.clearRect(0, 0, 400, 400);
        const zoom = parseFloat(document.getElementById('zoomSlider').value);
        const drawW = cropOriginalImg.width * zoom;
        const drawH = cropOriginalImg.height * zoom;
        const imgX = (400 - drawW) / 2;
        const imgY = (400 - drawH) / 2;
        cropCtx.drawImage(cropOriginalImg, imgX, imgY, drawW, drawH);
        
        const cropW = parseFloat(document.getElementById('cropWidthSlider').value);
        const cropH = parseFloat(document.getElementById('cropHeightSlider').value);
        const startX = (400 - cropW) / 2;
        const startY = (400 - cropH) / 2;
        cropCtx.strokeStyle = "#ffaa44";
        cropCtx.lineWidth = 3;
        cropCtx.strokeRect(startX, startY, cropW, cropH);
    }
    
    function updateCropValues() {
        document.getElementById('zoomVal').innerHTML = Math.round(parseFloat(document.getElementById('zoomSlider').value) * 100) + "%";
        document.getElementById('cropWVal').innerHTML = document.getElementById('cropWidthSlider').value + "px";
        document.getElementById('cropHVal').innerHTML = document.getElementById('cropHeightSlider').value + "px";
        drawCropCanvas();
    }
    
    function getCroppedImage(callback) {
        const cropW = parseFloat(document.getElementById('cropWidthSlider').value);
        const cropH = parseFloat(document.getElementById('cropHeightSlider').value);
        const startX = (400 - cropW) / 2;
        const startY = (400 - cropH) / 2;
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = cropW;
        tempCanvas.height = cropH;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(cropCanvas, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
        tempCanvas.toBlob(callback, 'image/jpeg', 0.85);
    }
    
    function openCropEditor() {
        const fileInput = document.getElementById('inp-image-upload');
        if (fileInput.files.length === 0) {
            showToast("Please select an image first", true);
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            cropOriginalImg = new Image();
            cropOriginalImg.onload = function() {
                cropImageLoaded = true;
                document.getElementById('zoomSlider').value = 1;
                document.getElementById('cropWidthSlider').value = 200;
                document.getElementById('cropHeightSlider').value = 200;
                updateCropValues();
                document.getElementById('cropModal').style.display = 'flex';
            };
            cropOriginalImg.src = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
    
    document.getElementById('zoomSlider').addEventListener('input', updateCropValues);
    document.getElementById('cropWidthSlider').addEventListener('input', updateCropValues);
    document.getElementById('cropHeightSlider').addEventListener('input', updateCropValues);
    
    document.getElementById('applyCropBtn').addEventListener('click', function() {
        if (!cropImageLoaded) return;
        getCroppedImage(function(blob) {
            if (blob) {
                pendingCroppedBlob = blob;
                document.getElementById('cropModal').style.display = 'none';
                const previewArea = document.getElementById('imagePreviewArea');
                const previewImg = document.getElementById('previewImg');
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewArea.style.display = 'block';
                    showToast("✓ Cropped image ready");
                };
                reader.readAsDataURL(blob);
            }
        });
    });
    
    document.getElementById('cancelCropBtn').addEventListener('click', function() {
        document.getElementById('cropModal').style.display = 'none';
    });
    
    // ========== RENDER FUNCTIONS ==========
    function renderCurrentTable() { currentTab === 'main' ? renderMainTable() : renderSettingsTable(); }
    
    function renderMainTable() {
        const tbody = document.getElementById('body-main');
        if (!mainData.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-row">✨ No content. Click + to add ✨</td></tr>';
            return;
        }
        let html = '';
        mainData.forEach((item) => {
            html += `<tr>
                <td><img src="${item.thumbnail}" class="thumb" onerror="this.src='https://via.placeholder.com/48?text=Err'" title="Click to view thumbnail"></td>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td><span class="badge-cat">${escapeHtml(item.category)}</span></td>
                <td class="url-cell" title="${escapeHtml(item.url)}">${escapeHtml(item.url)}</td>
                <td>
                    <button class="action-btn edit-i" onclick='openEditMain(${item.rowNum}, ${JSON.stringify(item).replace(/'/g, "&#39;")})'><i class="fa fa-edit"></i></button>
                    <button class="action-btn del-i" onclick="deleteRecordItem('Sheet1', ${item.rowNum}, '${item.fileId}')"><i class="fa fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    function renderSettingsTable() {
        const tbody = document.getElementById('body-set');
        if (!settingsData.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-row">⚙️ No settings. Click + to add ⚙️</td></tr>';
            return;
        }
        let html = '';
        settingsData.forEach((item) => {
            html += `<tr>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td class="url-cell" title="${escapeHtml(item.url)}">${escapeHtml(item.url)}</td>
                <td>v${escapeHtml(item.version)}</td>
                <td class="url-cell" title="${escapeHtml(item.updateUrl)}">${escapeHtml(item.updateUrl)}</td>
                <td>
                    <button class="action-btn edit-i" onclick='openEditSettings(${item.rowNum}, ${JSON.stringify(item).replace(/'/g, "&#39;")})'><i class="fa fa-edit"></i></button>
                    <button class="action-btn del-i" onclick="deleteRecordItem('settings', ${item.rowNum}, '')"><i class="fa fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('table-main').style.display = tab === 'main' ? 'table' : 'none';
        document.getElementById('table-set').style.display = tab === 'settings' ? 'table' : 'none';
        document.getElementById('btn-main').classList.toggle('active', tab === 'main');
        document.getElementById('btn-settings').classList.toggle('active', tab === 'settings');
        renderCurrentTable();
    }
    
    function openAddModal() {
        editContext = { isEdit: false, rowIndex: null, oldFileId: null, oldThumbUrl: null };
        pendingCroppedBlob = null;
        document.getElementById('modal-title').innerText = "➕ Add New Content";
        document.getElementById('form-main-fields').style.display = 'block';
        document.getElementById('form-settings-fields').style.display = 'none';
        document.getElementById('inp-title').value = '';
        document.getElementById('inp-category-select').value = 'Movies';
        document.getElementById('inp-link').value = '';
        document.getElementById('inp-image-upload').value = '';
        document.getElementById('imagePreviewArea').style.display = 'none';
        document.getElementById('globalModal').style.display = 'flex';
    }
    
    function openEditMain(rowNum, item) {
        editContext = { isEdit: true, rowIndex: rowNum, oldFileId: item.fileId || '', oldThumbUrl: item.thumbnail || '' };
        pendingCroppedBlob = null;
        document.getElementById('modal-title').innerText = "✏️ Edit Content";
        document.getElementById('form-main-fields').style.display = 'block';
        document.getElementById('form-settings-fields').style.display = 'none';
        document.getElementById('inp-title').value = item.name || '';
        document.getElementById('inp-category-select').value = item.category || 'Movies';
        document.getElementById('inp-link').value = item.url || '';
        document.getElementById('inp-image-upload').value = '';
        document.getElementById('imagePreviewArea').style.display = 'none';
        document.getElementById('globalModal').style.display = 'flex';
    }
    
    function openEditSettings(rowNum, item) {
        editContext = { isEdit: true, rowIndex: rowNum, oldFileId: null, oldThumbUrl: null };
        document.getElementById('modal-title').innerText = "✏️ Edit Settings";
        document.getElementById('form-main-fields').style.display = 'none';
        document.getElementById('form-settings-fields').style.display = 'block';
        document.getElementById('set-appname').value = item.name || '';
        document.getElementById('set-baseurl').value = item.url || '';
        document.getElementById('set-version').value = item.version || '';
        document.getElementById('set-updateurl').value = item.updateUrl || '';
        document.getElementById('set-ratingurl').value = item.ratingUrl || '';
        document.getElementById('set-privacyurl').value = item.privacyUrl || '';
        document.getElementById('set-shareurl').value = item.shareUrl || '';
        document.getElementById('globalModal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; pendingCroppedBlob = null; }
    
    window.addEventListener('load', () => { loadLogo(); fetchAllData(); });
    window.openEditMain = openEditMain;
    window.openEditSettings = openEditSettings;
    window.deleteRecordItem = deleteRecordItem;
    window.openCropEditor = openCropEditor;
    window.refreshData = refreshData;
    window.switchTab = switchTab;
    window.openAddModal = openAddModal;
    window.closeModal = closeModal;
    window.performSave = performSave;
</script>
