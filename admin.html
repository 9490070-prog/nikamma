<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Admin Hub | Category Video Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      color: #edf2ff;
      padding: 16px 12px 40px 12px;
    }
    .dashboard-container { max-width: 1600px; margin: 0 auto; width: 100%; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
      background: rgba(12, 20, 32, 0.9); backdrop-filter: blur(12px);
      padding: 10px 18px; border-radius: 48px;
      border: 1px solid rgba(0, 170, 255, 0.35);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }
    .logo-area h2 {
      font-size: clamp(1rem, 5.5vw, 1.6rem); font-weight: 700;
      background: linear-gradient(125deg, #00ccff, #4d9eff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .logo-area p { font-size: 0.6rem; color: #8e9bbe; }
    .add-global-btn {
      background: linear-gradient(95deg, #0a9eff, #006bb3); border: none;
      width: 40px; height: 40px; border-radius: 40px; font-size: 22px;
      font-weight: bold; color: white; cursor: pointer; transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0, 170, 255, 0.4); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .add-global-btn:hover { transform: scale(0.97); background: #2ab4ff; }
    .category-card {
      background: #222b44; border-radius: 9px; padding: 6px 0 8px 0;
      margin-bottom: 15px; border: 1px solid #222b44; transition: 0.2s;
      box-shadow: 0 5px 8px -6px rgba(0, 0, 0, 0.6);
    }
    .category-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; padding: 0 18px 12px 18px;
      border-bottom: 2px solid rgba(0, 170, 255, 0.5); margin-bottom: 16px;
    }
    .category-title {
      font-size: clamp(1.1rem, 5vw, 1.6rem); font-weight: 600;
      background: linear-gradient(130deg, #f0f9ff, #9acdff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .category-badge {
      background: #ffaa33; padding: 4px 11px; border-radius: 15px;
      font-size: 0.7rem; font-weight: 400; color: #000;
    }
    .horizontal-scroll {
      display: flex; overflow-x: auto; gap: 16px; padding: 8px 18px 20px 18px;
      scrollbar-width: thin; scrollbar-color: #00aaff #20273f;
      -webkit-overflow-scrolling: touch;
    }
    .horizontal-scroll::-webkit-scrollbar { height: 5px; }
    .horizontal-scroll::-webkit-scrollbar-track { background: #FCFAFA; border-radius: 12px; }
    .horizontal-scroll::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 12px; }
    .video-card {
      min-width: 230px; width: 230px; background: #0b1120; border-radius: 10px;
      overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #2a3452; flex-shrink: 0; cursor: pointer;
    }
    @media (max-width: 550px) {
      .video-card { min-width: 190px; width: 190px; }
      .thumb-wrapper { height: 118px; }
      .video-name { font-size: 0.85rem; }
      .small-edit, .small-delete { padding: 4px 10px; font-size: 0.65rem; }
    }
    @media (max-width: 430px) {
      .video-card { min-width: 170px; width: 170px; }
      .thumb-wrapper { height: 105px; }
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 28px -12px #00aaff30;
      border-color: #00aaff99;
    }
    .thumb-wrapper {
      width: 100%; height: 130px; background: #05080f;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.25s; }
    .video-info { padding: 10px 10px 12px; }
    .video-name {
      font-weight: 700; font-size: 0.9rem; margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .video-url {
      font-size: 0.6rem; color: #7a86a6; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px;
    }
    .video-actions { display: flex; gap: 8px; margin-top: 5px; }
    .small-edit, .small-delete {
      font-size: 0.68rem; padding: 5px 11px; border-radius: 30px;
      border: none; font-weight: 600; cursor: pointer; transition: 0.1s;
    }
    .small-edit { background: #ffaa33; color: #101010; }
    .small-delete { background: #e34d4d; color: white; }
    .empty-cat-msg {
      color: #6c7aa3; font-style: italic; padding: 20px 16px;
      background: #0c1120; border-radius: 30px; text-align: center;
      margin: 0 18px; font-size: 0.8rem;
    }
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.94); backdrop-filter: blur(12px);
      justify-content: center; align-items: center; z-index: 2000; padding: 16px;
    }
    .modal-panel {
      background: #0f609091; max-width: 500px; width: 100%; border-radius: 20px;
      padding: 20px 20px 28px; border: 1px solid #2c4670;
      box-shadow: 0 30px 45px rgba(0,0,0,0.5);
    }
    .modal-panel h3 { font-size: 1.5rem; margin-bottom: 18px; color: #2fd0ff; }
    .modal-panel input, .modal-panel select {
      width: 100%; padding: 12px 16px; margin: 10px 0;
      background: #0a1020; border: 1px solid #2c3e62; border-radius: 60px;
      color: white; font-size: 0.9rem; outline: none;
    }
    /* Current thumbnail preview */
    .current-thumb-row {
      display: none; align-items: center; gap: 10px;
      background: #0d1a10; border: 1px solid #1e4a2a;
      border-radius: 16px; padding: 8px 14px; margin: 10px 0;
    }
    .current-thumb-row img {
      width: 64px; height: 42px; object-fit: cover;
      border-radius: 8px; border: 1px solid #2a5535; flex-shrink: 0;
    }
    .current-thumb-row .ctr-text { font-size: 0.72rem; color: #66cc88; line-height: 1.5; }
    .current-thumb-row .ctr-text strong { display: block; color: #99ffcc; }
    /* Thumb label */
    .thumb-label-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; color: #8ea8d0; padding: 4px 2px 6px;
    }
    .badge-opt {
      background: #1a3a20; color: #44dd88;
      border-radius: 20px; padding: 2px 10px; font-size: 0.65rem; font-weight: 600;
    }
    .badge-req {
      background: #3a1a1a; color: #ff6666;
      border-radius: 20px; padding: 2px 10px; font-size: 0.65rem; font-weight: 600;
    }
    .img-edit-row {
      display: flex; gap: 12px; align-items: center;
      background: #0a1020; padding: 5px 14px; border-radius: 60px; margin: 4px 0;
    }
    .icon-edit-btn {
      background: #28a87a; border: none; border-radius: 40px;
      width: 42px; height: 42px; font-size: 18px; cursor: pointer; flex-shrink: 0;
    }
    .modal-buttons {
      display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap;
    }
    .modal-buttons button {
      flex: 1; padding: 11px; border-radius: 50px;
      font-weight: bold; border: none; cursor: pointer;
    }
    .btn-save-item { background: #00aaff; color: white; }
    .btn-cancel-modal { background: #ff4d4d; color: white; }
    .progress-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
      justify-content: center; align-items: center; z-index: 3000; flex-direction: column;
    }
    .progress-card {
      background: #101a28; padding: 14px 18px; border-radius: 18px;
      text-align: center; min-width: 260px; width: 80%; max-width: 340px;
      border: 1px solid #00aaff66;
    }
    .progress-bar-container {
      width: 100%; height: 26px; background: #1e2a3a;
      border-radius: 40px; overflow: hidden; margin: 14px 0;
    }
    .progress-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #00aaff, #2ad4ff);
      transition: width 0.25s ease; display: flex; align-items: center;
      justify-content: center; color: white; font-size: 12px; font-weight: bold;
    }
    #progressStatusText { color: #bbd4ff; font-weight: 500; font-size: 0.85rem; }
    .toast-msg {
      position: fixed; bottom: 20px; right: 20px; left: auto;
      background: #1f2a44; padding: 10px 20px; border-radius: 50px;
      backdrop-filter: blur(12px); border-left: 5px solid #00ffaa;
      z-index: 3500; display: none; font-weight: 500; font-size: 0.85rem;
      box-shadow: 0 6px 14px black;
    }
    @media (max-width: 550px) { .toast-msg { left: 16px; right: 16px; text-align: center; } }
    .crop-modal-container {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.98); backdrop-filter: blur(10px);
      z-index: 4000; justify-content: center; align-items: center; padding: 12px;
    }
    .crop-inner {
      background: #0f1725; width: 96%; max-width: 1000px; border-radius: 32px;
      padding: 16px; display: flex; flex-direction: column; max-height: 92vh;
    }
    .crop-canvas-area {
      background: #03060c; border-radius: 24px; padding: 10px;
      display: flex; justify-content: center; min-height: 200px;
      max-height: 40vh; overflow: hidden;
    }
    .canvas-relative { position: relative; display: inline-block; }
    #cropCanvas { display: block; border-radius: 16px; background: #1a1f30; max-width: 100%; height: auto; }
    #cropSelectionBox {
      position: absolute; border: 3px solid #ffaa44;
      background: rgba(255,170,68,0.2); pointer-events: none; box-sizing: border-box;
    }
    .scroll-controls-area { flex: 1; overflow-y: auto; margin-top: 16px; padding-right: 5px; max-height: 38vh; }
    .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    @media (max-width: 580px) { .control-grid { grid-template-columns: 1fr; gap: 10px; } }
    .ctrl-group label { font-size: 12px; font-weight: 500; color: #9bb5ff; }
    .ctrl-group input { width: 100%; margin: 6px 0; }
    .crop-buttons { display: flex; gap: 14px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .crop-buttons button { padding: 8px 22px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="admin-header">
    <div class="logo-area">
      <h2>🎬 ADMIN DASHBOARD</h2>
    
    </div>
    <button class="add-global-btn" id="openAddGlobalBtn" title="Add new video">+</button>
  </div>
  <div id="categoriesContainer"></div>
</div>

<!-- MODAL -->
<div id="globalModal" class="modal-overlay">
  <div class="modal-panel">
    <h3 id="modalTitle">➕ Add Video</h3>
    <input type="text" id="videoName" placeholder="Video title *">
    <select id="videoCategorySelect">
      <option value="">-- Category --</option>
      <option value="Live">Live</option>
      <option value="Movies">Movies</option>
      <option value="Drama">Drama</option>
      <option value="Slider">Slider</option>
      <option value="Sports">Sports</option>
      <option value="Tv Show">Tv Show</option>
    </select>
    <input type="text" id="videoUrl" placeholder="Video URL *">

    <!-- Thumbnail label + badge -->
    <div class="thumb-label-row">
      🖼️ Thumbnail &nbsp;<span id="thumbBadge" class="badge-req">Required</span>
    </div>

    <!-- Current image preview (edit mode only) -->
    <div class="current-thumb-row" id="currentThumbRow">
      <img id="currentThumbImg" src="" alt="current thumb">
      <div class="ctr-text">
        <strong>✅ Current Image Safe Hai</strong>
        Nai image select nahi ki to yeh image waise hi rahegi
      </div>
    </div>

    <!-- File input + crop -->
    <div class="img-edit-row">
      <button type="button" id="openMiniImageBtn" class="icon-edit-btn">✂️</button>
      <input type="file" id="thumbFile" accept="image/*" style="flex:1; background:transparent; border:none; padding:8px 0; color:#aac4ff;">
    </div>

    <div class="modal-buttons">
      <button id="modalSubmitBtn" class="btn-save-item">Save</button>
      <button id="closeModalBtn" class="btn-cancel-modal">Cancel</button>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div id="progressOverlay" class="progress-overlay">
  <div class="progress-card">
    <h4 style="color:#00aaff;">⚙️ Processing</h4>
    <div class="progress-bar-container">
      <div class="progress-fill" id="progressFillBar">0%</div>
    </div>
    <div id="progressStatusText">Please wait...</div>
  </div>
</div>

<!-- CROP MODAL -->
<div id="cropToolModal" class="crop-modal-container">
  <div class="crop-inner">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h4 style="color:#00aaff;">✂️ Image Editor</h4>
      <button id="closeCropModalBtn" style="background:#ff5555; border:none; padding:5px 16px; border-radius:40px;">✖️</button>
    </div>
    <div class="crop-canvas-area">
      <div class="canvas-relative">
        <canvas id="cropCanvas" width="450" height="280"></canvas>
        <div id="cropSelectionBox"></div>
      </div>
    </div>
    <div class="scroll-controls-area">
      <div class="control-grid">
        <div class="ctrl-group"><label>⬅️ X Position</label><input type="range" id="cropXSlider" min="0" max="100" step="1"><span id="xPosVal" style="font-size:11px;">0px</span></div>
        <div class="ctrl-group"><label>⬆️ Y Position</label><input type="range" id="cropYSlider" min="0" max="100" step="1"><span id="yPosVal" style="font-size:11px;">0px</span></div>
        <div class="ctrl-group"><label>📏 Crop Width</label><input type="range" id="cropWidthSlider" min="30" max="800" step="5"><span id="widthVal">240px</span></div>
        <div class="ctrl-group"><label>📐 Crop Height</label><input type="range" id="cropHeightSlider" min="30" max="800" step="5"><span id="heightVal">180px</span></div>
        <div class="ctrl-group"><label>🔍 Zoom</label><input type="range" id="zoomScaleSlider" min="10" max="250" step="5"><span id="zoomPercent">40%</span></div>
      </div>
    </div>
    <div class="crop-buttons">
      <button id="applyCropSaveBtn" style="background:#2ecc71;">💾 Save Cropped</button>
      <button id="cancelCropToolBtn" style="background:#777;">Cancel</button>
    </div>
  </div>
</div>

<div id="toastMessage" class="toast-msg"></div>

<script>
  // ✅ Apna API URL yahan rakho
  const API_URL = "https://script.google.com/macros/s/AKfycbyaZUpz_hXLMQuOPMUPxHrbqcwg6lvGpc4OYPnxEwHHJEyJxznQwY7S4bTFEsaXxQOUrQ/exec";

  let allVideos = [];
  let currentEditRow = null;
  let isEditMode = false;

  // ─── Progress ────────────────────────────────────────────────────────────────
  function showProgress(show, percent = 0, msg = "Processing...") {
    document.getElementById("progressOverlay").style.display = show ? "flex" : "none";
    if (show) updateProgress(percent, msg);
  }
  function updateProgress(percent, msg) {
    const fill = document.getElementById("progressFillBar");
    fill.style.width = percent + "%";
    fill.innerText = Math.floor(percent) + "%";
    document.getElementById("progressStatusText").innerText = msg;
  }
  function showToast(text, type = "success") {
    const t = document.getElementById("toastMessage");
    t.innerText = text;
    t.style.borderLeftColor = type === "error" ? "#ff4444" : "#00ffaa";
    t.style.background = type === "error" ? "#2a1010" : "#1a2a1a";
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 3000);
  }

  // ─── Load Data ───────────────────────────────────────────────────────────────
  async function loadData() {
    try {
      showProgress(true, 15, "Fetching data...");
      const res = await fetch(API_URL);
      const data = await res.json();
      allVideos = Array.isArray(data) ? data.map(item => ({
        rowNumber: item.rowNumber,
        Name: item.Name || "",
        Category: item.Category || "",
        URL: item.URL || "#",
        Thumbnail: item.Thumbnail || ""
      })) : [];
      updateProgress(100, "Rendering...");
      setTimeout(() => showProgress(false), 300);
      renderCategories();
    } catch (e) {
      showProgress(false);
      showToast("Load error: " + e.message, "error");
      allVideos = [];
      renderCategories();
    }
  }

  // ─── Render ──────────────────────────────────────────────────────────────────
  function getCategories() {
    const order = ["Sports", "Tv Show", "Live", "Movies", "Drama", "Slider"];
    const cats = [...new Set(allVideos.map(v => v.Category).filter(Boolean))];
    return cats.sort((a, b) => {
      const ia = order.indexOf(a), ib = order.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;
      return a.localeCompare(b);
    });
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }

  function renderCategories() {
    const container = document.getElementById("categoriesContainer");
    const categories = getCategories();
    if (!categories.length) {
      container.innerHTML = `<div style="background:#0f1624;border-radius:38px;padding:34px;text-align:center;">✨ No categories. Click + to add ✨</div>`;
      return;
    }
    let html = "";
    for (const cat of categories) {
      const videos = allVideos.filter(v => v.Category === cat);
      html += `<div class="category-card">
        <div class="category-header">
          <span class="category-title">${esc(cat)}</span>
          <span class="category-badge">${videos.length} Item${videos.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="horizontal-scroll">`;

      if (!videos.length) {
        html += `<div class="empty-cat-msg">📭 No videos yet.</div>`;
      } else {
        for (const v of videos) {
          const thumb = v.Thumbnail || "https://placehold.co/300x180/1a2340/white?text=No+Image";
          html += `<div class="video-card" data-url="${esc(v.URL)}">
            <div class="thumb-wrapper">
              <img src="${esc(thumb)}" loading="lazy" onerror="this.src='https://placehold.co/300x180/2a3555/white?text=Err'">
            </div>
            <div class="video-info">
              <div class="video-name">${esc(v.Name)}</div>
              <div class="video-url">${v.URL.length > 42 ? esc(v.URL.substring(0,40))+'...' : esc(v.URL)}</div>
              <div class="video-actions">
                <button class="small-edit"
                  data-row="${v.rowNumber}"
                  data-name="${esc(v.Name)}"
                  data-cat="${esc(v.Category)}"
                  data-url="${esc(v.URL)}"
                  data-thumb="${esc(v.Thumbnail)}">✏️ Edit</button>
                <button class="small-delete"
                  data-row="${v.rowNumber}"
                  data-name="${esc(v.Name)}">🗑️ Delete</button>
              </div>
            </div>
          </div>`;
        }
      }
      html += `</div></div>`;
    }
    container.innerHTML = html;
    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll(".small-edit").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        openEditModal(
          parseInt(btn.dataset.row),
          btn.dataset.name,
          btn.dataset.cat,
          btn.dataset.url,
          btn.dataset.thumb
        );
      });
    });
    document.querySelectorAll(".small-delete").forEach(btn => {
      btn.addEventListener("click", async e => {
        e.stopPropagation();
        if (confirm(`Delete "${btn.dataset.name}"?`)) await deleteVideo(parseInt(btn.dataset.row));
      });
    });
    document.querySelectorAll(".video-card").forEach(card => {
      card.addEventListener("click", e => {
        if (e.target.classList.contains("small-edit") || e.target.classList.contains("small-delete")) return;
        const url = card.dataset.url;
        if (url) window.open(url, "_blank");
      });
    });
  }

  // ─── Delete ──────────────────────────────────────────────────────────────────
  async function deleteVideo(rowNumber) {
    showProgress(true, 30, "Deleting...");
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "DELETE", rowNumber })
      });
      const result = await res.json();
      if (result.status === "DELETED") {
        showToast("🗑️ Deleted!");
        await loadData();
      } else {
        showToast("Delete failed: " + (result.message || ""), "error");
      }
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      showProgress(false);
    }
  }

  // ─── Modal Open ───────────────────────────────────────────────────────────────
  function openAddModal() {
    isEditMode = false;
    currentEditRow = null;

    document.getElementById("modalTitle").innerHTML = "➕ Add New Video";
    document.getElementById("modalSubmitBtn").innerHTML = "Add";
    document.getElementById("modalSubmitBtn").style.background = "#00aaff";
    document.getElementById("videoName").value = "";
    document.getElementById("videoCategorySelect").value = "";
    document.getElementById("videoUrl").value = "";
    document.getElementById("thumbFile").value = "";
    document.getElementById("currentThumbRow").style.display = "none";
    document.getElementById("thumbBadge").textContent = "Required";
    document.getElementById("thumbBadge").className = "badge-req";
    document.getElementById("globalModal").style.display = "flex";
  }

  function openEditModal(row, name, cat, url, thumb) {
    isEditMode = true;
    currentEditRow = row;

    document.getElementById("modalTitle").innerHTML = "✏️ Edit Video";
    document.getElementById("modalSubmitBtn").innerHTML = "Update";
    document.getElementById("modalSubmitBtn").style.background = "#ffaa33";
    document.getElementById("videoName").value = name;
    document.getElementById("videoCategorySelect").value = cat;
    document.getElementById("videoUrl").value = url;
    document.getElementById("thumbFile").value = "";

    // Show current thumb preview
    const previewRow = document.getElementById("currentThumbRow");
    if (thumb && thumb.trim()) {
      document.getElementById("currentThumbImg").src = thumb;
      previewRow.style.display = "flex";
    } else {
      previewRow.style.display = "none";
    }

    // Mark thumbnail as optional
    document.getElementById("thumbBadge").textContent = "Optional";
    document.getElementById("thumbBadge").className = "badge-opt";

    document.getElementById("globalModal").style.display = "flex";
  }

  // ─── Submit ───────────────────────────────────────────────────────────────────
  async function submitVideo() {
    const name     = document.getElementById("videoName").value.trim();
    const category = document.getElementById("videoCategorySelect").value;
    const url      = document.getElementById("videoUrl").value.trim();
    const file     = document.getElementById("thumbFile").files[0];

    if (!name || !category || !url) {
      showToast("❌ Name, Category aur URL bharo", "error");
      return;
    }

    document.getElementById("globalModal").style.display = "none";
    showProgress(true, 10, "Preparing...");

    // Convert file to base64 if selected
    let base64Thumb = null;
    if (file) {
      base64Thumb = await new Promise(resolve => {
        const rd = new FileReader();
        rd.onload = () => resolve(rd.result);
        rd.readAsDataURL(file);
      });
    }

    // ════ EDIT MODE ════
    if (isEditMode && currentEditRow !== null) {
      updateProgress(30, "Updating record...");
      try {
        // ✅ action: "EDIT" — Apps Script sirf row update karega, DELETE nahi karega
        // ✅ thumbnail: sirf base64 bhejna agar nai image select ki ho
        //    → Agar null bheja to Apps Script purani image waise hi rakhega
        const payload = {
          action:   "EDIT",
          rowNumber: currentEditRow,
          name,
          category,
          url
        };
        if (base64Thumb) {
          payload.thumbnail = base64Thumb; // nai image
        }
        // Agar base64Thumb null hai — payload mein thumbnail field hi nahi hogi
        // Apps Script ka EDIT handler: thumbnail nahi aayi to kuch nahi karega image ke liye

        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "UPDATED") {
          showToast("✅ Video updated!");
          await loadData();
        } else {
          showToast("Update failed: " + (result.message || ""), "error");
        }
      } catch (e) {
        showToast("Error: " + e.message, "error");
      } finally {
        showProgress(false);
      }
      return;
    }

    // ════ ADD MODE ════
    if (!base64Thumb) {
      showProgress(false);
      showToast("❌ Nai video ke liye thumbnail zaroori hai!", "error");
      return;
    }

    updateProgress(50, "Adding video...");
    try {
      const payload = { name, category, url, thumbnail: base64Thumb };
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      const result = await res.json();
      if (result.status === "OK") {
        showToast("✅ Video added!");
        await loadData();
      } else {
        showToast("Add failed: " + (result.message || ""), "error");
      }
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      showProgress(false);
    }
  }

  // ─── Cropper ──────────────────────────────────────────────────────────────────
  let cropImg = new Image();
  let naturalW = 1, naturalH = 1;
  let zoomVal = 0.45, cropW = 240, cropH = 180, cropX = 0, cropY = 0;

  function openCropper(file) {
    const reader = new FileReader();
    reader.onload = e => {
      cropImg = new Image();
      cropImg.onload = () => {
        naturalW = cropImg.width; naturalH = cropImg.height;
        zoomVal = 0.45;
        cropW = Math.min(380, naturalW); cropH = Math.min(260, naturalH);
        cropX = 0; cropY = 0;
        document.getElementById("zoomScaleSlider").value = zoomVal * 100;
        document.getElementById("cropWidthSlider").value = cropW;
        document.getElementById("cropHeightSlider").value = cropH;
        document.getElementById("cropToolModal").style.display = "flex";
        drawCropCanvas();
      };
      cropImg.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function drawCropCanvas() {
    if (!cropImg.complete) return;
    const canvas = document.getElementById("cropCanvas");
    const ctx = canvas.getContext("2d");
    const dw = naturalW * zoomVal, dh = naturalH * zoomVal;
    canvas.width = dw; canvas.height = dh;
    ctx.clearRect(0, 0, dw, dh);
    ctx.drawImage(cropImg, 0, 0, dw, dh);
    const box = document.getElementById("cropSelectionBox");
    box.style.left   = (cropX * zoomVal) + "px";
    box.style.top    = (cropY * zoomVal) + "px";
    box.style.width  = Math.max(2, cropW * zoomVal) + "px";
    box.style.height = Math.max(2, cropH * zoomVal) + "px";
    document.getElementById("xPosVal").innerText    = Math.round(cropX) + "px";
    document.getElementById("yPosVal").innerText    = Math.round(cropY) + "px";
    document.getElementById("widthVal").innerText   = Math.round(cropW) + "px";
    document.getElementById("heightVal").innerText  = Math.round(cropH) + "px";
    document.getElementById("zoomPercent").innerText = Math.round(zoomVal * 100) + "%";
    const maxX = Math.max(0, naturalW - cropW), maxY = Math.max(0, naturalH - cropH);
    document.getElementById("cropXSlider").max = maxX;
    document.getElementById("cropYSlider").max = maxY;
    document.getElementById("cropXSlider").value = Math.min(maxX, cropX);
    document.getElementById("cropYSlider").value = Math.min(maxY, cropY);
    document.getElementById("cropWidthSlider").max = naturalW;
    document.getElementById("cropHeightSlider").max = naturalH;
  }

  function applyCrop() {
    let fx = Math.min(cropX, naturalW - cropW);
    let fy = Math.min(cropY, naturalH - cropH);
    let fw = Math.min(cropW, naturalW - fx);
    let fh = Math.min(cropH, naturalH - fy);
    if (fw <= 0 || fh <= 0) { showToast("Invalid crop area", "error"); return; }
    const tmp = document.createElement("canvas");
    tmp.width = fw; tmp.height = fh;
    tmp.getContext("2d").drawImage(cropImg, fx, fy, fw, fh, 0, 0, fw, fh);
    tmp.toBlob(blob => {
      const f = new File([blob], "cropped.jpg", { type: "image/jpeg" });
      const dt = new DataTransfer(); dt.items.add(f);
      document.getElementById("thumbFile").files = dt.files;
      showToast("✅ Crop applied!");
      document.getElementById("cropToolModal").style.display = "none";
    }, "image/jpeg", 0.9);
  }

  ["cropXSlider","cropYSlider","cropWidthSlider","cropHeightSlider","zoomScaleSlider"].forEach(id => {
    document.getElementById(id)?.addEventListener("input", e => {
      const v = parseFloat(e.target.value);
      if (id === "cropXSlider")      cropX = v;
      if (id === "cropYSlider")      cropY = v;
      if (id === "cropWidthSlider")  cropW = v;
      if (id === "cropHeightSlider") cropH = v;
      if (id === "zoomScaleSlider")  zoomVal = v / 100;
      drawCropCanvas();
    });
  });

  // ─── Button wiring ────────────────────────────────────────────────────────────
  document.getElementById("openMiniImageBtn").addEventListener("click", () => {
    const inp = document.getElementById("thumbFile");
    if (inp.files?.[0]) openCropper(inp.files[0]);
    else showToast("Pehle image select karo", "error");
  });
  document.getElementById("applyCropSaveBtn").addEventListener("click", applyCrop);
  document.getElementById("cancelCropToolBtn").addEventListener("click", () => document.getElementById("cropToolModal").style.display = "none");
  document.getElementById("closeCropModalBtn").addEventListener("click", () => document.getElementById("cropToolModal").style.display = "none");
  document.getElementById("openAddGlobalBtn").onclick = openAddModal;
  document.getElementById("closeModalBtn").onclick = () => document.getElementById("globalModal").style.display = "none";
  document.getElementById("modalSubmitBtn").onclick = submitVideo;

  loadData();
</script>
</body>
</html>
