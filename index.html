<script>
    const SHEET1_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=0&single=true&output=csv';
    const SETTINGS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=1123743396&single=true&output=csv';
    
    const VERSION = 3.8;
    let rawData = [];
    let settingsData = {};
    let currentCategory = 'All';
    let vjsPlayer = videojs('mainVideo');
    let tsPlayer = null;
    let isNavOpen = false;
    let isRefreshing = false;
    let currentDataHash = '';

    // ========== HASH GENERATION FOR DATA COMPARE ==========
    function generateDataHash(data) {
        try {
            const importantFields = data.map(item => ({
                name: item.name || item.Name || '',
                url: item.URL || item.url || '',
                category: item.Category || item.category || '',
                thumbnail: item.Thumbnail || item.thumbnail || ''
            }));
            return btoa(unescape(encodeURIComponent(JSON.stringify(importantFields))));
        } catch(e) {
            return Date.now().toString();
        }
    }
    
    function isDataSame(newData, oldData) {
        if(newData.length !== oldData.length) return false;
        const newHash = generateDataHash(newData);
        const oldHash = generateDataHash(oldData);
        return newHash === oldHash;
    }
    
    // ========== CACHE MANAGEMENT ==========
    function saveDataToCache(data, settings) {
        try {
            const dataHash = generateDataHash(data);
            currentDataHash = dataHash;
            const cacheData = {
                rawData: data,
                settingsData: settings,
                timestamp: Date.now(),
                dataHash: dataHash
            };
            localStorage.setItem(STORAGE_KEY_DATA, JSON.stringify(cacheData));
            localStorage.setItem(STORAGE_KEY_HASH, dataHash);
        } catch(e) {
            console.error('Cache save error:', e);
        }
    }
    
    function loadDataFromCache() {
        try {
            const cached = localStorage.getItem(STORAGE_KEY_DATA);
            if(cached) {
                const cacheData = JSON.parse(cached);
                if(cacheData.rawData && cacheData.rawData.length > 0) {
                    rawData = cacheData.rawData;
                    currentDataHash = cacheData.dataHash || '';
                    if(cacheData.settingsData) {
                        settingsData = cacheData.settingsData;
                        applySettings();
                    }
                    return true;
                }
            }
        } catch(e) {
            console.error('Cache load error:', e);
        }
        return false;
    }
    
    function showCachedDataBadge() {
        const badge = document.getElementById('data-save-badge');
        badge.classList.add('show');
        setTimeout(() => {
            badge.classList.remove('show');
        }, 2000);
    }
    
    function showNoUpdateBadge() {
        const badge = document.getElementById('no-update-badge');
        badge.classList.add('show');
        setTimeout(() => {
            badge.classList.remove('show');
        }, 2000);
    }
    
    // ========== PROFESSIONAL PULL TO REFRESH ==========
    let ptrStartY = 0;
    let ptrActive = false;
    let ptrHeight = 0;
    
    function updatePTR(status, pullDistance = 0) {
        const ptrContainer = document.getElementById('ptr-container');
        const ptrText = document.getElementById('ptr-text');
        const ptrIcon = document.getElementById('ptr-icon');
        
        if(status === 'pull') {
            const height = Math.min(pullDistance, 70);
            ptrContainer.style.height = height + 'px';
            if(pullDistance > 50) {
                ptrText.innerText = 'Release to refresh';
                ptrIcon.innerHTML = '<i class="fa fa-refresh" style="font-size:20px"></i>';
            } else {
                ptrText.innerText = 'Pull to refresh';
                ptrIcon.innerHTML = '<i class="fa fa-arrow-down" style="font-size:20px"></i>';
            }
        } else if(status === 'release') {
            ptrContainer.style.height = '70px';
            ptrText.innerText = 'Refreshing...';
            ptrIcon.innerHTML = '<div class="ptr-loader"></div>';
        } else if(status === 'complete') {
            ptrContainer.style.height = '0px';
            setTimeout(() => {
                ptrText.innerText = 'Pull to refresh';
                ptrIcon.innerHTML = '<i class="fa fa-arrow-down" style="font-size:20px"></i>';
            }, 200);
        }
    }
    
    async function performRefresh() {
        if(isRefreshing) return;
        isRefreshing = true;
        updatePTR('release');
        
        try {
            const hasUpdates = await fetchFreshData();
            updatePTR('complete');
            if(hasUpdates) {
                showCachedDataBadge();
            } else {
                showNoUpdateBadge();
            }
        } catch(e) {
            console.error('Refresh error:', e);
            updatePTR('complete');
        }
        
        setTimeout(() => {
            isRefreshing = false;
        }, 500);
    }
    
    function forceRefreshData() {
        if(isRefreshing) return;
        performRefresh();
        closeNav();
    }
    
    // ========== TOUCH HANDLERS FOR PTR ==========
    let touchStartY = 0;
    let touchStartX = 0;
    let isTouching = false;
    
    document.addEventListener('touchstart', function(e) {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        if(scrollTop === 0 && !isRefreshing) {
            touchStartY = e.touches[0].pageY;
            touchStartX = e.touches[0].pageX;
            isTouching = true;
            ptrActive = false;
            ptrHeight = 0;
        }
    }, {passive: true});
    
    document.addEventListener('touchmove', function(e) {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const touchY = e.touches[0].pageY;
        const diffY = touchY - touchStartY;
        const diffX = Math.abs(e.touches[0].pageX - touchStartX);
        
        if(diffX > 30 && Math.abs(diffY) < 30 && !isNavOpen && touchStartX < 50) {
            openNav();
            touchStartY = touchY;
        }
        
        if(scrollTop === 0 && diffY > 0 && !isRefreshing && diffX < 30 && isTouching) {
            e.preventDefault();
            ptrActive = true;
            ptrHeight = Math.min(diffY, 70);
            updatePTR('pull', ptrHeight);
        }
    }, {passive: false});
    
    document.addEventListener('touchend', function(e) {
        if(ptrActive && ptrHeight > 50 && !isRefreshing) {
            performRefresh();
        } else if(ptrActive) {
            updatePTR('complete');
        }
        isTouching = false;
        ptrActive = false;
        ptrHeight = 0;
    });
    
    // ========== DATA FETCHING WITH COMPARE ==========
    function fetchFreshData() {
        return new Promise((resolve, reject) => {
            Papa.parse(SHEET1_CSV, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let newRawData = [];
                    if(results.data && results.data.length > 0) {
                        newRawData = results.data.filter(item => {
                            return item && (item.name || item.Name || item.URL || item.url);
                        });
                        newRawData = newRawData.map(item => {
                            let cat = (item.Category || item.category || "").trim();
                            if(cat.toLowerCase() === "tv shows" || cat.toLowerCase() === "tvshow" || cat.toLowerCase() === "tv_show") {
                                item.Category = "TV Shows";
                                item.category = "TV Shows";
                            }
                            return item;
                        });
                    }
                    
                    Papa.parse(SETTINGS_CSV, {
                        download: true, header: true, skipEmptyLines: true,
                        complete: function(settingsResults) {
                            let newSettings = {};
                            if(settingsResults.data && settingsResults.data.length > 0) {
                                newSettings = settingsResults.data[0];
                            }
                            
                            const isSame = isDataSame(newRawData, rawData);
                            
                            if(!isSame && newRawData.length > 0) {
                                rawData = newRawData;
                                settingsData = newSettings;
                                applySettings();
                                saveDataToCache(rawData, settingsData);
                                updateUIAfterDataLoad();
                                resolve(true);
                            } else {
                                if(rawData.length === 0 && newRawData.length > 0) {
                                    rawData = newRawData;
                                    settingsData = newSettings;
                                    applySettings();
                                    saveDataToCache(rawData, settingsData);
                                    updateUIAfterDataLoad();
                                    resolve(true);
                                } else {
                                    saveDataToCache(rawData, settingsData);
                                    resolve(false);
                                }
                            }
                        },
                        error: function(err) {
                            console.error("Settings parse error:", err);
                            const isSame = isDataSame(newRawData, rawData);
                            if(!isSame && newRawData.length > 0) {
                                rawData = newRawData;
                                saveDataToCache(rawData, settingsData);
                                updateUIAfterDataLoad();
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }
                    });
                },
                error: function(error) {
                    console.error("CSV Parse Error:", error);
                    reject(error);
                }
            });
        });
    }
    
    function updateUIAfterDataLoad() {
        updateSlider();
        filterData(currentCategory, null, false);
        
        const splash = document.getElementById('splash-screen');
        if(splash && splash.style.display !== 'none') {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
        }
    }
    
    function applySettings() {
        if(settingsData.ratingUrl) document.getElementById('rating-link').href = settingsData.ratingUrl;
        if(settingsData.privacyUrl) document.getElementById('privacy-link').href = settingsData.privacyUrl;
        if(settingsData.version && parseFloat(settingsData.version) > VERSION) {
            document.getElementById('update-overlay').style.display = 'flex';
            document.getElementById('update-btn').onclick = () => window.location.href = settingsData.updateUrl;
        }
    }
    
    async function fetchData() {
        const hasCache = loadDataFromCache();
        
        if(hasCache && rawData.length > 0) {
            updateSlider();
            filterData(currentCategory, null, false);
            showCachedDataBadge();
            
            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
            
            fetchFreshData().then(updated => {
                if(updated) {
                    console.log("Data was updated from server");
                } else {
                    console.log("Data is same as cache, no update needed");
                }
            }).catch(console.error);
        } else {
            try {
                await fetchFreshData();
            } catch(e) {
                console.error("Initial fetch error:", e);
                const grid = document.getElementById('mainGrid');
                showEmptyState(grid, "Network Error! Pull to refresh.", "fa-wifi");
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }
            }
        }
    }
    
    // ========== UI FUNCTIONS ==========
    function showEmptyState(grid, message, icon = 'fa-folder-open') {
        if(!grid) return;
        grid.innerHTML = `
            <div style="grid-column: 1/-1;" class="empty-state">
                <i class="fa ${icon}"></i>
                <h3>${message}</h3>
                <p>Pull down from top to refresh</p>
            </div>
        `;
    }
    
    function updateSlider() {
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        const mainTrack = document.getElementById('sliderTrack');
        
        if(sliders.length > 0 && mainTrack) {
            const sliderHTML = sliders.map(s => {
                let img = s.Thumbnail || s.thumbnail || s.URL || s.url || MASTER_LOGO;
                return `<div class="slide-item"><img src="${img}" loading="lazy" onerror="handleImageError(this)" onload="handleImageLoad(this)" class="img-loading"></div>`;
            }).join('');
            mainTrack.innerHTML = sliderHTML;
            const videoBoxDisplay = document.getElementById('videoBox').style.display;
            document.getElementById('mainSlider').style.display = (currentCategory === 'All' && videoBoxDisplay !== 'block') ? 'block' : 'none';
        } else {
            document.getElementById('mainSlider').style.display = 'none';
        }
    }
    
    function filterData(cat, btn, shouldClose = true) {
        currentCategory = cat;
        if(shouldClose) closeNav();
        const sliderDiv = document.getElementById('mainSlider');
        const videoBox = document.getElementById('videoBox');
        
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        
        sliderDiv.style.display = (cat === 'All' && videoBox.style.display !== 'block' && sliders.length > 0) ? 'block' : 'none';
        
        document.querySelectorAll('.nav-btn').forEach(b => {
            if(b.getAttribute('data-cat') === cat) b.classList.add('active');
            else b.classList.remove('active');
        });
        
        let sectionNameText = cat === 'All' ? 'ALL CONTENT' : (cat === 'TV Shows' ? 'TV SHOWS' : cat.toUpperCase());
        document.getElementById('sectionName').innerText = sectionNameText;
        
        let filtered = [];
        if(cat === 'All') {
            filtered = rawData.filter(d => {
                const category = (d.Category || d.category || "").toLowerCase();
                return category !== 'slider';
            });
        } else {
            filtered = rawData.filter(d => {
                const category = (d.Category || d.category || "").trim();
                return category.toLowerCase() === cat.toLowerCase();
            });
        }
        
        const grid = document.getElementById('mainGrid');
        
        if(!filtered || filtered.length === 0) {
            let message = '';
            let icon = 'fa-folder-open';
            if(cat === 'All') {
                message = 'No content available';
                icon = 'fa-database';
            } else if(cat === 'Movies') {
                message = 'No movies found';
                icon = 'fa-film';
            } else if(cat === 'Sports') {
                message = 'No live sports available';
                icon = 'fa-tv';
            } else if(cat === 'TV Shows') {
                message = 'No TV shows found';
                icon = 'fa-tv';
            }
            showEmptyState(grid, message, icon);
            return;
        }
        
        grid.innerHTML = filtered.map((item, index) => {
            let thumb = item.Thumbnail || item.thumbnail || MASTER_LOGO;
            let itemName = item.name || item.Name || "Untitled";
            let url = item.URL || item.url || "#";
            itemName = itemName.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
            return `
            <div class="card" data-url="${escapeHtml(url)}" data-title="${escapeHtml(itemName)}" onclick="play('${escapeHtml(url)}', '${escapeHtml(itemName)}', this)">
                <img src="${thumb}" loading="lazy" onerror="handleImageError(this)" onload="handleImageLoad(this)" class="img-loading">
                <div class="card-title">${itemName}</div>
            </div>
        `}).join('');
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function play(url, title, cardElement) {
        if(!url || url === '#') return;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
        if(cardElement) cardElement.classList.add('playing');
        document.getElementById('videoBox').style.display = 'block';
        document.getElementById('mainSlider').style.display = 'none';
        document.getElementById('videoTitle').innerText = title;
        window.scrollTo({top: 0, behavior: 'smooth'});
        if (tsPlayer) { tsPlayer.unload(); tsPlayer.destroy(); tsPlayer = null; }
        vjsPlayer.pause();
        if (url.includes('.ts')) {
            const videoElement = document.querySelector('#mainVideo_html5_api') || document.querySelector('#mainVideo');
            try {
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                tsPlayer.attachMediaElement(videoElement);
                tsPlayer.load();
                tsPlayer.play();
            } catch(e) {
                console.error("TS Player Error:", e);
                vjsPlayer.src({ src: url, type: 'video/mp4' });
                vjsPlayer.play();
            }
        } else {
            let videoType = 'video/mp4';
            if(url.includes('m3u8')) videoType = 'application/x-mpegURL';
            vjsPlayer.src({ src: url, type: videoType });
            vjsPlayer.play();
        }
    }
    
    function stopVideo() {
        if (tsPlayer) { tsPlayer.unload(); tsPlayer.destroy(); tsPlayer = null; }
        vjsPlayer.pause();
        document.getElementById('videoBox').style.display = 'none';
        document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        if(currentCategory === 'All' && sliders.length > 0) document.getElementById('mainSlider').style.display = 'block';
    }
    
    function search() {
        let term = document.getElementById('searchBar').value.toLowerCase().trim();
        const grid = document.getElementById('mainGrid');
        
        if(term === '') {
            filterData(currentCategory, null, false);
            return;
        }
        
        const filtered = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            const name = (d.name || d.Name || "").toLowerCase();
            return name.includes(term) && category !== 'slider';
        });
        
        if(filtered.length === 0) {
            showEmptyState(grid, `No results for "${term}"`, 'fa-search');
            return;
        }
        
        grid.innerHTML = filtered.map(item => {
            let thumb = item.Thumbnail || item.thumbnail || MASTER_LOGO;
            let itemName = item.name || item.Name || "Untitled";
            let url = item.URL || item.url || "#";
            return `<div class="card" onclick="play('${url.replace(/'/g, "\\'")}', '${itemName.replace(/'/g, "\\'")}', this)">
                <img src="${thumb}" loading="lazy" onerror="handleImageError(this)" onload="handleImageLoad(this)" class="img-loading">
                <div class="card-title">${itemName}</div>
            </div>`;
        }).join('');
    }
    
    function shareApp(e) {
        if(e) e.preventDefault();
        const shareURL = settingsData.shareUrl || window.location.href;
        if(navigator.share) navigator.share({ title: 'Nikamma 4k', url: shareURL });
        else window.open(shareURL, '_blank');
    }
    
    function openNav() { 
        const sideNav = document.getElementById("mySidenav");
        const overlay = document.getElementById("menu-overlay");
        overlay.style.display = "block";
        setTimeout(() => {
            sideNav.classList.add("open");
            overlay.classList.add("visible");
        }, 10);
        isNavOpen = true;
    }
    
    function closeNav() { 
        const sideNav = document.getElementById("mySidenav");
        const overlay = document.getElementById("menu-overlay");
        sideNav.classList.remove("open");
        overlay.classList.remove("visible");
        isNavOpen = false;
        setTimeout(() => {
            if(!isNavOpen) overlay.style.display = "none";
        }, 400);
    }
    
    function toggleSearch(show) {
        document.getElementById('header-main').style.display = show ? 'none' : 'flex';
        document.getElementById('header-icons').style.display = show ? 'none' : 'flex';
        document.getElementById('search-container').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('searchBar').focus();
    }
    
    let slideIndex = 0;
    let sliderInterval;
    
    function startSlider() {
        if(sliderInterval) clearInterval(sliderInterval);
        sliderInterval = setInterval(() => {
            const track = document.getElementById('sliderTrack');
            if(track && track.children.length > 0) {
                slideIndex = (slideIndex + 1) % track.children.length;
                track.style.transform = `translateX(-${slideIndex * 100}%)`;
            }
        }, 5000);
    }
    
    fetchData();
    
    setInterval(() => {
        const track = document.getElementById('sliderTrack');
        if(track && track.children.length > 0 && !sliderInterval) {
            startSlider();
        }
    }, 1000);
</script>
