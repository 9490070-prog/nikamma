<!DOCTYPE html>
<html lang="ur">
<head>
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#121212">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nikamma 4k v3.4 | Ultimate HD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --main-color: #00bcd4; 
            --dark-bg: #0b0b0b; 
            --card-bg: #1a1a1a; 
            --header-bg: #121212;
            --splash-bg: radial-gradient(circle, #1a1a1a 0%, #0b0b0b 100%);
            --max-width: 1200px;
            --main-font: 'Poppins', sans-serif;
            --nav-width: 280px;
        }
        
        body { 
            background: var(--dark-bg); color: white; 
            font-family: var(--main-font); 
            margin: 0; padding-bottom: 80px; overflow-x: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: var(--max-width); margin: 0 auto; width: 100%; }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--splash-bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .splash-logo { 
            width: 100px; height: 100px; border-radius: 20px; 
            margin-bottom: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            animation: pulse 2s infinite; 
            object-fit: cover;
        }
        #splash-screen h2 { margin: 0; padding: 0; color: var(--main-color); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; }
        .splash-loader { margin-top: 10px !important; color: #444; font-size: 20px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        header { 
            background: var(--header-bg); padding: 12px 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222;
            height: 60px; box-sizing: border-box;
        }
        
        /* Menu Icon in Header (Hamburger) - replaces logo */
        .menu-icon-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--main-color);
            width: 36px;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .menu-icon-btn:active {
            transform: scale(0.9);
        }
        
        .app-name { 
            font-weight: 800; 
            font-size: 18px; 
            color: var(--main-color); 
            letter-spacing: 0.5px; 
            text-transform: uppercase;
            margin-left: 8px;
        }
        
        .section-label { padding: 12px 15px 5px 15px; font-weight: 600; color: #aaa; letter-spacing: 1px; font-size: 13px; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #282828; cursor: pointer; transition: 0.3s; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .card-title { 
            font-size: 11px; 
            padding: 6px 3px; 
            text-align: center; 
            color: #efefef; 
            font-weight: 400;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            background: rgba(0,0,0,0.3);
        }
        
        .card.playing { background: var(--main-color) !important; border-color: #fff; transform: scale(0.95); }
        .card.playing .card-title { color: #000 !important; font-weight: 800; }
        
        /* Empty State Styles */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #888;
        }
        .empty-state p {
            font-size: 13px;
            color: #555;
        }
        
        /* SideNav Styles */
        .sidenav { 
            height: 100%; 
            width: var(--nav-width); 
            position: fixed; 
            z-index: 2005; 
            top: 0; 
            left: 0;
            background: #111; 
            overflow-x: hidden; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateX(-100%);
            padding-top: 0; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidenav.open { transform: translateX(0); }

        .nav-header {
            width: 100%;
            height: 160px;
            background: #000;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid var(--main-color); 
        }
        .nav-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidenav a { 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 400; 
            color: #bbb; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid #1a1a1a;
            transition: 0.2s;
        }
        .sidenav a:active { background: #222; color: var(--main-color); }

        #menu-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            z-index: 2004;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #menu-overlay.visible { display: block; opacity: 1; }

        /* Pull to Refresh Styles */
        #refresh-icon { 
            width: 100%; 
            text-align: center; 
            height: 0; 
            overflow: hidden; 
            transition: height 0.2s ease-out; 
            color: var(--main-color); 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.5); 
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }
        
        .header-content { display: flex; width: 100%; max-width: var(--max-width); margin: 0 auto; align-items: center; justify-content: space-between; }
        .header-left, .header-right { display: flex; align-items: center; gap: 12px; font-size: 18px; cursor: pointer; }
        #search-container { display: none; flex: 1; align-items: center; gap: 10px; margin: 0 20px; }
        #searchBar { flex: 1; background: #222; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; font-family: var(--main-font); }
        #videoBox { display: none; width: 100%; background: #000; position: sticky; top: 60px; z-index: 1001; }
        .video-js { width: 100% !important; height: 210px !important; }
        
        .slider { width: 100%; height: 200px; overflow: hidden; position: relative; background: #000; margin-bottom: 5px; }
        .slides-track { display: flex; transition: 0.7s cubic-bezier(0.25, 1, 0.5, 1); height: 100%; }
        .slide-item { min-width: 100%; height: 100%; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(18,18,18,0.95); display: flex; justify-content: space-around; padding: 10px 0; backdrop-filter: blur(10px); border-top: 1px solid #222; z-index: 1000; }
        .nav-btn i { font-size: 18px; margin-bottom: 2px; display: block; }
        .nav-btn { text-align: center; font-size: 10px; color: #888; flex: 1; cursor: pointer; font-weight: 600; letter-spacing: 0.5px; }
        .nav-btn.active { color: var(--main-color); }
        #update-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .update-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--main-color); text-align: center; width: 80%; max-width: 400px; }
        
        /* Loading skeleton */
        .skeleton-card {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 10px;
            aspect-ratio: 1/1;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

</script>

<div id="splash-screen">

    <h2>Nikamma 4k</h2>

        <button id="update-btn" style="background:var(--main-color); border:none; padding:12px 25px; border-radius:25px; font-weight:bold; cursor:pointer; font-family: var(--main-font);">UPDATE NOW</button>

<script>
    const SHEET1_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=0&single=true&output=csv';
    const SETTINGS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQD2lHL-u6zHPZKdYIVD4eXp98XipkVP4jKfxLDoNje9DeZ1726o0zFZf-gAR2kZj0ls7VhceXbbKih/pub?gid=1123743396&single=true&output=csv';
    
    const VERSION = 3.4;
    let rawData = [];
    let settingsData = {};
    let currentCategory = 'All';
    let vjsPlayer = videojs('mainVideo');
    let tsPlayer = null;
    let startY = 0;
    let startX = 0;
    let isNavOpen = false;
    let isRefreshing = false;
    let pullStartY = 0;
    let pullActive = false;

    function openNav() { 
        const sideNav = document.getElementById("mySidenav");
        const overlay = document.getElementById("menu-overlay");
        overlay.style.display = "block";
        setTimeout(() => {
            sideNav.classList.add("open");
            overlay.classList.add("visible");
        }, 10);
        isNavOpen = true;
    }

    function closeNav() { 
        const sideNav = document.getElementById("mySidenav");
        const overlay = document.getElementById("menu-overlay");
        sideNav.classList.remove("open");
        overlay.classList.remove("visible");
        isNavOpen = false;
        setTimeout(() => {
            if(!isNavOpen) overlay.style.display = "none";
        }, 400);
    }

    function toggleSearch(show) {
        document.getElementById('header-main').style.display = show ? 'none' : 'flex';
        document.getElementById('header-icons').style.display = show ? 'none' : 'flex';
        document.getElementById('search-container').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('searchBar').focus();
    }

    function showEmptyState(grid, message, icon = 'fa-folder-open') {
        grid.innerHTML = `
            <div style="grid-column: 1/-1;" class="empty-state">
                <i class="fa ${icon}"></i>
                <h3>${message}</h3>
                <p>Check back later for new content!</p>
            </div>
        `;
    }

    function refreshData() {
        if(isRefreshing) return;
        isRefreshing = true;
        showRefreshIndicator(true);
        fetchData(true);
    }

    function showRefreshIndicator(show) {
        const refreshIcon = document.getElementById('refresh-icon');
        if(show) {
            refreshIcon.style.height = '50px';
            refreshIcon.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i><span style="margin-left:8px">Refreshing...</span>';
            setTimeout(() => {
                if(refreshIcon.style.height !== '0') {
                    refreshIcon.style.height = '0';
                }
            }, 2000);
        } else {
            refreshIcon.style.height = '0';
            refreshIcon.innerHTML = '<i class="fa fa-arrow-down"></i><span style="margin-left:8px">Pull to refresh</span>';
        }
        isRefreshing = false;
    }

    async function fetchData(isRefresh = false) {
        if(!isRefresh) {
            const grid = document.getElementById('mainGrid');
            if(grid) {
                grid.innerHTML = `
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                `;
            }
        }
        
        Papa.parse(SHEET1_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                if(results.data && results.data.length > 0) {
                    rawData = results.data.filter(item => {
                        return item && (item.name || item.Name || item.URL || item.url);
                    });
                    rawData = rawData.map(item => {
                        let cat = (item.Category || item.category || "").trim();
                        if(cat.toLowerCase() === "tv shows" || cat.toLowerCase() === "tvshow" || cat.toLowerCase() === "tv_show") {
                            item.Category = "TV Shows";
                            item.category = "TV Shows";
                        }
                        return item;
                    });
                } else {
                    rawData = [];
                }
                updateSlider();
                filterData(currentCategory, null, false);
                fetchSettings();
                if(isRefresh) {
                    showRefreshIndicator(false);
                }
            },
            error: function(error) {
                console.error("CSV Parse Error:", error);
                const grid = document.getElementById('mainGrid');
                showEmptyState(grid, "Failed to load data!", "fa-exclamation-triangle");
                if(isRefresh) showRefreshIndicator(false);
                fetchSettings();
            }
        });
    }

    function fetchSettings() {
        Papa.parse(SETTINGS_CSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                if(results.data && results.data.length > 0) {
                    settingsData = results.data[0];
                    if(settingsData.ratingUrl) document.getElementById('rating-link').href = settingsData.ratingUrl;
                    if(settingsData.privacyUrl) document.getElementById('privacy-link').href = settingsData.privacyUrl;
                    if(settingsData.version && parseFloat(settingsData.version) > VERSION) {
                        document.getElementById('update-overlay').style.display = 'flex';
                        document.getElementById('update-btn').onclick = () => window.location.href = settingsData.updateUrl;
                    }
                }
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }
            },
            error: function(error) {
                console.error("Settings Parse Error:", error);
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 500);
                }
            }
        });
    }

    function updateSlider() {
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        const mainTrack = document.getElementById('sliderTrack');
        
        if(sliders.length > 0) {
            const sliderHTML = sliders.map(s => {
                let img = s.Thumbnail || s.thumbnail || s.URL || s.url || MASTER_LOGO;
                return `<div class="slide-item"><img src="${img}" onerror="this.src='${MASTER_LOGO}'"></div>`;
            }).join('');
            if(mainTrack) mainTrack.innerHTML = sliderHTML;
            const videoBoxDisplay = document.getElementById('videoBox').style.display;
            document.getElementById('mainSlider').style.display = (currentCategory === 'All' && videoBoxDisplay !== 'block') ? 'block' : 'none';
        } else {
            document.getElementById('mainSlider').style.display = 'none';
        }
    }

    function filterData(cat, btn, shouldClose = true) {
        currentCategory = cat;
        if(shouldClose) closeNav();
        const sliderDiv = document.getElementById('mainSlider');
        const videoBox = document.getElementById('videoBox');
        
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        
        sliderDiv.style.display = (cat === 'All' && videoBox.style.display !== 'block' && sliders.length > 0) ? 'block' : 'none';
        
        document.querySelectorAll('.nav-btn').forEach(b => {
            if(b.getAttribute('data-cat') === cat) b.classList.add('active');
            else b.classList.remove('active');
        });
        
        let sectionNameText = cat === 'All' ? 'ALL CONTENT' : (cat === 'TV Shows' ? 'TV SHOWS' : cat.toUpperCase());
        document.getElementById('sectionName').innerText = sectionNameText;
        
        let filtered = [];
        if(cat === 'All') {
            filtered = rawData.filter(d => {
                const category = (d.Category || d.category || "").toLowerCase();
                return category !== 'slider';
            });
        } else {
            filtered = rawData.filter(d => {
                const category = (d.Category || d.category || "").trim();
                return category.toLowerCase() === cat.toLowerCase();
            });
        }
        
        const grid = document.getElementById('mainGrid');
        
        if(!filtered || filtered.length === 0) {
            let message = '';
            let icon = 'fa-folder-open';
            if(cat === 'All') {
                message = 'No content available';
                icon = 'fa-database';
            } else if(cat === 'Movies') {
                message = 'No movies found';
                icon = 'fa-film';
            } else if(cat === 'Sports') {
                message = 'No live sports available';
                icon = 'fa-tv';
            } else if(cat === 'TV Shows') {
                message = 'No TV shows found';
                icon = 'fa-tv';
            }
            showEmptyState(grid, message, icon);
            return;
        }
        
        grid.innerHTML = filtered.map((item, index) => {
            let thumb = item.Thumbnail || item.thumbnail || MASTER_LOGO;
            let itemName = item.name || item.Name || "Untitled";
            let url = item.URL || item.url || "#";
            itemName = itemName.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
            return `
            <div class="card" data-url="${escapeHtml(url)}" data-title="${escapeHtml(itemName)}" onclick="play('${escapeHtml(url)}', '${escapeHtml(itemName)}', this)">
                <img src="${thumb}" loading="lazy" onerror="this.src='${MASTER_LOGO}'">
                <div class="card-title">${itemName}</div>
            </div>
        `}).join('');
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function play(url, title, cardElement) {
        if(!url || url === '#') return;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
        if(cardElement) cardElement.classList.add('playing');
        document.getElementById('videoBox').style.display = 'block';
        document.getElementById('mainSlider').style.display = 'none';
        document.getElementById('videoTitle').innerText = title;
        window.scrollTo({top: 0, behavior: 'smooth'});
        if (tsPlayer) { tsPlayer.unload(); tsPlayer.destroy(); tsPlayer = null; }
        vjsPlayer.pause();
        if (url.includes('.ts')) {
            const videoElement = document.querySelector('#mainVideo_html5_api') || document.querySelector('#mainVideo');
            try {
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                tsPlayer.attachMediaElement(videoElement);
                tsPlayer.load();
                tsPlayer.play();
            } catch(e) {
                console.error("TS Player Error:", e);
                vjsPlayer.src({ src: url, type: 'video/mp4' });
                vjsPlayer.play();
            }
        } else {
            let videoType = 'video/mp4';
            if(url.includes('m3u8')) videoType = 'application/x-mpegURL';
            vjsPlayer.src({ src: url, type: videoType });
            vjsPlayer.play();
        }
    }

    function stopVideo() {
        if (tsPlayer) { tsPlayer.unload(); tsPlayer.destroy(); tsPlayer = null; }
        vjsPlayer.pause();
        document.getElementById('videoBox').style.display = 'none';
        document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
        const sliders = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            return category === 'slider';
        });
        if(currentCategory === 'All' && sliders.length > 0) document.getElementById('mainSlider').style.display = 'block';
    }

    function search() {
        let term = document.getElementById('searchBar').value.toLowerCase().trim();
        const grid = document.getElementById('mainGrid');
        
        if(term === '') {
            filterData(currentCategory, null, false);
            return;
        }
        
        const filtered = rawData.filter(d => {
            const category = (d.Category || d.category || "").toLowerCase();
            const name = (d.name || d.Name || "").toLowerCase();
            return name.includes(term) && category !== 'slider';
        });
        
        if(filtered.length === 0) {
            showEmptyState(grid, `No results for "${term}"`, 'fa-search');
            return;
        }
        
        grid.innerHTML = filtered.map(item => {
            let thumb = item.Thumbnail || item.thumbnail || MASTER_LOGO;
            let itemName = item.name || item.Name || "Untitled";
            let url = item.URL || item.url || "#";
            return `<div class="card" onclick="play('${url.replace(/'/g, "\\'")}', '${itemName.replace(/'/g, "\\'")}', this)">
                <img src="${thumb}" loading="lazy" onerror="this.src='${MASTER_LOGO}'">
                <div class="card-title">${itemName}</div>
            </div>`;
        }).join('');
    }

    function shareApp(e) {
        if(e) e.preventDefault();
        const shareURL = settingsData.shareUrl || window.location.href;
        if(navigator.share) navigator.share({ title: 'Nikamma 4k', url: shareURL });
        else window.open(shareURL, '_blank');
    }

    // Pull to Refresh & Side Swipe
    let touchStartY = 0;
    let touchStartX = 0;
    
    document.addEventListener('touchstart', function(e) {
        touchStartY = e.touches[0].pageY;
        touchStartX = e.touches[0].pageX;
        pullStartY = touchStartY;
        pullActive = false;
    }, {passive: true});
    
    document.addEventListener('touchmove', function(e) {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const touchY = e.touches[0].pageY;
        const diffY = touchY - touchStartY;
        const diffX = Math.abs(e.touches[0].pageX - touchStartX);
        
        if (diffX > 30 && Math.abs(diffY) < 30 && !isNavOpen) {
            openNav();
            touchStartY = touchY;
        }
        
        if (scrollTop === 0 && diffY > 0 && !isRefreshing && diffX < 30) {
            e.preventDefault();
            pullActive = true;
            const pullDistance = Math.min(diffY, 80);
            const refreshIcon = document.getElementById('refresh-icon');
            if(pullDistance > 20) {
                refreshIcon.style.height = pullDistance + 'px';
                if(pullDistance > 60) {
                    refreshIcon.innerHTML = '<i class="fa fa-arrow-down"></i><span style="margin-left:8px">Release to refresh</span>';
                } else {
                    refreshIcon.innerHTML = '<i class="fa fa-arrow-down"></i><span style="margin-left:8px">Pull to refresh</span>';
                }
            }
        }
    }, {passive: false});
    
    document.addEventListener('touchend', function(e) {
        const refreshIcon = document.getElementById('refresh-icon');
        const currentHeight = parseInt(refreshIcon.style.height);
        
        if(pullActive && currentHeight > 60 && !isRefreshing) {
            refreshData();
        } else {
            refreshIcon.style.height = '0';
            setTimeout(() => {
                if(refreshIcon.style.height === '0px') {
                    refreshIcon.innerHTML = '<i class="fa fa-arrow-down"></i><span style="margin-left:8px">Pull to refresh</span>';
                }
            }, 100);
        }
        pullActive = false;
    });
    
    let slideIndex = 0;
    let sliderInterval;
    
    function startSlider() {
        if(sliderInterval) clearInterval(sliderInterval);
        sliderInterval = setInterval(() => {
            const track = document.getElementById('sliderTrack');
            if(track && track.children.length > 0) {
                slideIndex = (slideIndex + 1) % track.children.length;
                track.style.transform = `translateX(-${slideIndex * 100}%)`;
            }
        }, 4000);
    }
    
    const sliderObserver = new MutationObserver(function() {
        const track = document.getElementById('sliderTrack');
        if(track && track.children.length > 0) {
            startSlider();
        }
    });
    
    if(document.getElementById('sliderTrack')) {
        sliderObserver.observe(document.getElementById('sliderTrack'), { childList: true, subtree: true });
    }
    
    window.onload = () => {
        fetchData();
        startSlider();
    };
</script>
